<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organic Gradient Morphing — Canvas</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#0B0E16;color:#cdd6e4;overflow:hidden;
    font-family:-apple-system,"Helvetica Neue","Segoe UI",system-ui,sans-serif;}
  #c{position:fixed;inset:0;width:100%;height:100%;display:block;}
  .hud{position:fixed;left:22px;bottom:20px;font-size:13px;letter-spacing:.04em;text-transform:uppercase;opacity:.7;pointer-events:none;}
  .hud b{color:#fff;font-weight:600;}
  .ctrl{position:fixed;right:22px;bottom:20px;display:flex;gap:10px;}
  .ctrl button{background:rgba(255,255,255,.06);color:#cdd6e4;border:1px solid rgba(255,255,255,.12);
    border-radius:999px;padding:8px 16px;font-size:12px;cursor:pointer;letter-spacing:.05em;text-transform:uppercase;transition:background .2s;}
  .ctrl button:hover{background:rgba(255,255,255,.14);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">CANVAS MORPH · <b id="lbl">—</b></div>
<div class="ctrl"><button id="pp">Pause</button><button id="nx">Next ›</button></div>

<script src="morphing_geometry.js"></script>
<script src="morphing_config.js"></script>
<script>
const CFG=window.MORPH_CONFIG,G=window.MorphGeo,N=128,TAU=Math.PI*2;
const SHAPES=CFG.shapes.map(s=>({cfg:s,pts:G.shapeToPoints(s,N)}));
const ORDER=CFG.morphSequence.order.map(id=>SHAPES.findIndex(s=>s.cfg.id===id));
const noiseSeed=Array.from({length:N},(_,i)=>[Math.sin(i*12.9898)*43758.5453%1,Math.cos(i*78.233)*12543.21%1]);
const {lerpPts,ease,lerp,centroid}=G;
function hexA(hex,a){const h=hex.replace('#','');return`rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`;}

const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const off=document.createElement('canvas'),octx=off.getContext('2d');
let W,H,S,OX,OY,DPR,grain;
function resize(){DPR=Math.min(window.devicePixelRatio||1,2);W=cv.width=off.width=innerWidth*DPR;H=cv.height=off.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';S=Math.min(W,H)*0.86;OX=(W-S)/2;OY=(H-S)/2;buildGrain();}
addEventListener('resize',resize);
function buildGrain(){const g=document.createElement('canvas');g.width=g.height=256;const gx=g.getContext('2d'),id=gx.createImageData(256,256),d=id.data;
  for(let i=0;i<d.length;i+=4){const v=Math.random()*255;d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;}gx.putImageData(id,0,0);grain=g;}

function tracePath(c,pts,now){const m=pts.length,P=[],n=CFG.globalMotion.organicNoise,ph=now*0.001*n.speed*TAU;
  for(let i=0;i<m;i++){const nx=Math.sin(ph+noiseSeed[i][0]*TAU)*n.amplitude*0.18,ny=Math.cos(ph*1.3+noiseSeed[i][1]*TAU)*n.amplitude*0.18;
    P.push([OX+(pts[i][0]+nx)*S,OY+(pts[i][1]+ny)*S]);}
  c.beginPath();c.moveTo(P[0][0],P[0][1]);
  for(let i=0;i<m;i++){const p0=P[(i-1+m)%m],p1=P[i],p2=P[(i+1)%m],p3=P[(i+2)%m];
    c.bezierCurveTo(p1[0]+(p2[0]-p0[0])/6,p1[1]+(p2[1]-p0[1])/6,p2[0]-(p3[0]-p1[0])/6,p2[1]-(p3[1]-p1[1])/6,p2[0],p2[1]);}
  c.closePath();}
// 메시 색점 스택 (base dominant + color→transparent 라디얼)
function paintMesh(c,color,alpha){c.save();c.globalAlpha=alpha;
  c.fillStyle=color.dominant||'#888';c.fillRect(OX,OY,S,S);
  for(const pt of color.points){const cx=OX+pt.pos[0]*S,cy=OY+pt.pos[1]*S,r=Math.max(4,pt.radius*S),w=Math.min(1,pt.weight);
    const g=c.createRadialGradient(cx,cy,1,cx,cy,r);g.addColorStop(0,hexA(pt.color,w));g.addColorStop(0.55,hexA(pt.color,0.75*w));g.addColorStop(1,hexA(pt.color,0));
    c.fillStyle=g;c.fillRect(OX,OY,S,S);}c.restore();}

const lbl=document.getElementById('lbl');
let seqIdx=0,t0=performance.now(),playing=true,manualNext=false,raf;
const leg=i=>ORDER[i%ORDER.length],transOf=i=>CFG.morphSequence.transitions[i%CFG.morphSequence.transitions.length];

function frame(now){
  const tr=transOf(seqIdx),dur=tr.durationMs,hold=CFG.globalMotion.holdDurationMs,total=dur+hold;
  let elapsed=now-t0;if(manualNext){elapsed=total;manualNext=false;}
  const te=ease(Math.min(elapsed/dur,1)),A=SHAPES[leg(seqIdx)],B=SHAPES[leg(seqIdx+1)];
  const geom=lerpPts(A.pts,B.pts,te),ra=A.cfg.render,rb=B.cfg.render;
  const feather=lerp(ra.edgeFeather,rb.edgeFeather,te)*S,glowSpread=lerp(ra.glow.spread,rb.glow.spread,te)*S;
  const grainAmt=lerp(ra.grain,rb.grain,te);

  ctx.globalCompositeOperation='source-over';ctx.fillStyle='#0B0E16';ctx.fillRect(0,0,W,H);
  const bm=CFG.globalMotion.breathing,bt=(now/bm.periodMs)*TAU;
  const sc=1+(bm.scaleRange[1]-bm.scaleRange[0])*0.5*Math.sin(bt),rot=bm.rotationRange[1]*Math.sin(bt*0.7)*Math.PI/180;
  ctx.save();ctx.translate(OX+S/2,OY+S/2);ctx.scale(sc,sc);ctx.rotate(rot);ctx.translate(-(OX+S/2),-(OY+S/2));

  // (1) glow 헤일로 — dominant, 큰 블러
  ctx.globalCompositeOperation='screen';ctx.filter=`blur(${glowSpread.toFixed(1)}px)`;
  tracePath(ctx,geom,now);ctx.globalAlpha=ra.glow.opacity*(1-te);ctx.fillStyle=A.cfg.color.dominant;ctx.fill();
  tracePath(ctx,geom,now);ctx.globalAlpha=rb.glow.opacity*te;ctx.fillStyle=B.cfg.color.dominant;ctx.fill();
  ctx.globalAlpha=1;

  // (2) form — 오프스크린에 메시 스택(클립) → feather 블러로 합성
  octx.setTransform(1,0,0,1,0,0);octx.clearRect(0,0,W,H);
  octx.save();tracePath(octx,geom,now);octx.clip();
  paintMesh(octx,A.cfg.color,A.cfg.opacity*(1-te));
  paintMesh(octx,B.cfg.color,B.cfg.opacity*te);
  octx.restore();
  ctx.filter=`blur(${Math.max(1,feather).toFixed(1)}px)`;ctx.globalCompositeOperation='screen';ctx.drawImage(off,0,0);

  // (3) grain — 폼 내부
  ctx.filter='none';tracePath(ctx,geom,now);ctx.save();ctx.clip();
  ctx.globalAlpha=grainAmt;ctx.globalCompositeOperation='overlay';
  for(let y=0;y<H;y+=256)for(let x=0;x<W;x+=256)ctx.drawImage(grain,x,y);
  ctx.restore();ctx.globalAlpha=1;ctx.restore();

  // 비네팅
  ctx.globalCompositeOperation='source-over';
  const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3,W/2,H/2,Math.max(W,H)*0.62);
  vg.addColorStop(0,'rgba(5,7,11,0)');vg.addColorStop(1,'rgba(5,7,11,0.92)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  lbl.textContent=`${A.cfg.label}  →  ${B.cfg.label}`;
  if(elapsed>=total){seqIdx=(seqIdx+1)%ORDER.length;t0=now;}
  if(playing)raf=requestAnimationFrame(frame);
}
resize();raf=requestAnimationFrame(frame);
document.getElementById('pp').onclick=function(){playing=!playing;this.textContent=playing?'Pause':'Play';if(playing){t0=performance.now();raf=requestAnimationFrame(frame);}};
document.getElementById('nx').onclick=()=>{manualNext=true;if(!playing){playing=true;document.getElementById('pp').textContent='Pause';raf=requestAnimationFrame(frame);}};
</script>
</body>
</html>
