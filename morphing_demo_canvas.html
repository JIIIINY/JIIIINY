<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organic Gradient Morphing — Canvas</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:#0B0E14; color:#cdd6e4; overflow:hidden;
    font-family:-apple-system,"Helvetica Neue","Segoe UI",system-ui,sans-serif; }
  #c { position:fixed; inset:0; width:100%; height:100%; display:block; }
  .hud { position:fixed; left:22px; bottom:20px; font-size:13px; letter-spacing:.04em;
    text-transform:uppercase; opacity:.7; pointer-events:none; }
  .hud b { color:#fff; font-weight:600; }
  .ctrl { position:fixed; right:22px; bottom:20px; display:flex; gap:10px; }
  .ctrl button { background:rgba(255,255,255,.06); color:#cdd6e4; border:1px solid rgba(255,255,255,.12);
    border-radius:999px; padding:8px 16px; font-size:12px; cursor:pointer; letter-spacing:.05em;
    text-transform:uppercase; transition:background .2s; }
  .ctrl button:hover { background:rgba(255,255,255,.14); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">CANVAS MORPH · <b id="lbl">—</b></div>
<div class="ctrl">
  <button id="pp">Pause</button>
  <button id="nx">Next ›</button>
</div>

<script src="morphing_config.js"></script>
<script>
const CFG = window.MORPH_CONFIG;
const N = 128, TAU = Math.PI*2;

// ===== 형태 → 경계점 (SVG 데모와 동일 로직) =====
function centroid(p){let x=0,y=0;for(const q of p){x+=q[0];y+=q[1];}return[x/p.length,y/p.length];}
function sampleClosed(ctrl){
  const m=ctrl.length, dense=[], steps=24;
  for(let i=0;i<m;i++){
    const p0=ctrl[(i-1+m)%m],p1=ctrl[i],p2=ctrl[(i+1)%m],p3=ctrl[(i+2)%m];
    for(let s=0;s<steps;s++){const t=s/steps,t2=t*t,t3=t2*t;
      dense.push([
        0.5*((2*p1[0])+(-p0[0]+p2[0])*t+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3),
        0.5*((2*p1[1])+(-p0[1]+p2[1])*t+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3)]);
    }
  }
  return resample(dense);
}
function resample(poly){
  const acc=[0];let total=0;
  for(let i=1;i<poly.length;i++){total+=Math.hypot(poly[i][0]-poly[i-1][0],poly[i][1]-poly[i-1][1]);acc.push(total);}
  const out=[];
  for(let i=0;i<N;i++){const d=(i/N)*total;let k=1;while(k<acc.length&&acc[k]<d)k++;
    const a=acc[k-1],b=acc[k]||total,t=(b-a)?(d-a)/(b-a):0,p0=poly[k-1],p1=poly[k%poly.length];
    out.push([p0[0]+(p1[0]-p0[0])*t,p0[1]+(p1[1]-p0[1])*t]);}
  return out;
}
function sampleStar(star){
  const c=[0.5,0.5],out=[];
  for(let i=0;i<N;i++){const a=(i/N)*TAU,k=Math.abs(Math.cos(2*a)),spike=Math.pow(k,1+star.spikeSharpness*8);
    const r=star.innerRadius+(star.outerRadius-star.innerRadius)*spike;
    out.push([c[0]+Math.cos(a)*r,c[1]+Math.sin(a)*r]);}
  return out;
}
function sampleMetaballs(balls){
  let cx=0,cy=0;for(const b of balls){cx+=b.center[0];cy+=b.center[1];}cx/=balls.length;cy/=balls.length;
  const out=[];
  for(let i=0;i<N;i++){const a=(i/N)*TAU,dx=Math.cos(a),dy=Math.sin(a);let rmax=0;
    for(const b of balls){const ox=b.center[0]-cx,oy=b.center[1]-cy,proj=ox*dx+oy*dy,perp2=(ox*ox+oy*oy)-proj*proj;
      if(perp2<=b.radius*b.radius){const reach=proj+Math.sqrt(b.radius*b.radius-perp2);if(reach>rmax)rmax=reach;}}
    rmax*=1.12;out.push([cx+dx*rmax,cy+dy*rmax]);}
  return out;
}
function shapeToPoints(s){
  const f=s.form; let pts;
  if(f.star)pts=sampleStar(f.star); else if(f.metaballs)pts=sampleMetaballs(f.metaballs); else pts=sampleClosed(f.blob.controlPoints);
  const c=centroid(pts);
  return pts.map(p=>({p,a:Math.atan2(p[1]-c[1],p[0]-c[0])})).sort((u,v)=>u.a-v.a).map(o=>o.p);
}

const SHAPES = CFG.shapes.map(s=>({cfg:s,pts:shapeToPoints(s)}));
const ORDER = CFG.morphSequence.order.map(id=>SHAPES.findIndex(s=>s.cfg.id===id));
const noiseSeed = Array.from({length:N},(_,i)=>[Math.sin(i*12.9898)*43758.5453%1,Math.cos(i*78.233)*12543.21%1]);
function lerpPts(a,b,t){return a.map((p,i)=>[p[0]+(b[i][0]-p[0])*t,p[1]+(b[i][1]-p[1])*t]);}
function ease(u){return u<0.5?4*u*u*u:1-Math.pow(-2*u+2,3)/2;}

// ===== Canvas 설정 =====
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let W,H,S,OX,OY,DPR;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=cv.width=innerWidth*DPR; H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px';
  S=Math.min(W,H)*0.86; OX=(W-S)/2; OY=(H-S)/2;
  buildGrain();
}
addEventListener('resize',resize);

// 노이즈 그레인 텍스처(오프스크린)
let grain;
function buildGrain(){
  const g=document.createElement('canvas'); g.width=256; g.height=256;
  const gx=g.getContext('2d'), id=gx.createImageData(256,256), d=id.data;
  for(let i=0;i<d.length;i+=4){const v=Math.random()*255;d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;}
  gx.putImageData(id,0,0); grain=g;
}

function buildPathOnCtx(pts,now){
  const m=pts.length,P=[],n=CFG.globalMotion.organicNoise,ph=now*0.001*n.speed*TAU;
  for(let i=0;i<m;i++){
    const nx=Math.sin(ph+noiseSeed[i][0]*TAU)*n.amplitude*0.25;
    const ny=Math.cos(ph*1.3+noiseSeed[i][1]*TAU)*n.amplitude*0.25;
    P.push([OX+(pts[i][0]+nx)*S, OY+(pts[i][1]+ny)*S]);
  }
  ctx.beginPath(); ctx.moveTo(P[0][0],P[0][1]);
  for(let i=0;i<m;i++){
    const p0=P[(i-1+m)%m],p1=P[i],p2=P[(i+1)%m],p3=P[(i+2)%m];
    const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
    ctx.bezierCurveTo(c1x,c1y,c2x,c2y,p2[0],p2[1]);
  }
  ctx.closePath();
}

function makeGradient(color){
  let g;
  if(color.type==='radial-gradient'){
    const c=color.center||[0.5,0.5];
    g=ctx.createRadialGradient(OX+c[0]*S,OY+c[1]*S,S*0.02, OX+c[0]*S,OY+c[1]*S,S*0.62);
  } else {
    const a=(color.angle||0)*Math.PI/180, R=S*0.52, cx=OX+S/2, cy=OY+S/2;
    g=ctx.createLinearGradient(cx-Math.cos(a)*R,cy-Math.sin(a)*R,cx+Math.cos(a)*R,cy+Math.sin(a)*R);
  }
  for(const s of color.stops) g.addColorStop(Math.max(0,Math.min(1,s.offset)), s.color);
  return g;
}

// ===== 루프 =====
const lbl=document.getElementById('lbl');
let seqIdx=0,t0=performance.now(),playing=true,manualNext=false,raf;
function leg(i){return ORDER[i%ORDER.length];}
function transOf(i){const t=CFG.morphSequence.transitions;return t[i%t.length];}

function frame(now){
  const tr=transOf(seqIdx),dur=tr.durationMs,hold=CFG.globalMotion.holdDurationMs,total=dur+hold;
  let elapsed=now-t0; if(manualNext){elapsed=total;manualNext=false;}
  const u=Math.min(elapsed/dur,1), te=ease(u);
  const A=SHAPES[leg(seqIdx)],B=SHAPES[leg(seqIdx+1)];
  const geom=lerpPts(A.pts,B.pts,te);

  // 배경 + 비네팅
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle='#0B0E14'; ctx.fillRect(0,0,W,H);

  // breathing 변환
  const bm=CFG.globalMotion.breathing, bt=(now/bm.periodMs)*TAU;
  const sc=1+(bm.scaleRange[1]-bm.scaleRange[0])*0.5*Math.sin(bt);
  const rot=bm.rotationRange[1]*Math.sin(bt*0.7)*Math.PI/180;
  ctx.save();
  ctx.translate(OX+S/2,OY+S/2); ctx.scale(sc,sc); ctx.rotate(rot); ctx.translate(-(OX+S/2),-(OY+S/2));

  const blur=(A.cfg.blur+(B.cfg.blur-A.cfg.blur)*te)*(S/1000);
  ctx.globalCompositeOperation='screen';

  // 레이어 A (페이드 아웃)
  ctx.filter=`blur(${blur.toFixed(1)}px)`;
  buildPathOnCtx(geom,now);
  ctx.globalAlpha=A.cfg.opacity*(1-te);
  ctx.fillStyle=makeGradient(A.cfg.color); ctx.fill();

  // 레이어 B (페이드 인)
  buildPathOnCtx(geom,now);
  ctx.globalAlpha=B.cfg.opacity*te;
  ctx.fillStyle=makeGradient(B.cfg.color); ctx.fill();

  ctx.filter='none'; ctx.globalAlpha=1; ctx.restore();

  // 비네팅
  ctx.globalCompositeOperation='source-over';
  const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3,W/2,H/2,Math.max(W,H)*0.62);
  vg.addColorStop(0,'rgba(5,7,11,0)'); vg.addColorStop(1,'rgba(5,7,11,0.92)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

  // 필름 그레인
  if(grain && CFG.canvas.renderHints.filmGrain.enabled){
    ctx.globalAlpha=CFG.canvas.renderHints.filmGrain.opacity;
    ctx.globalCompositeOperation='overlay';
    const gs=256; for(let y=0;y<H;y+=gs) for(let x=0;x<W;x+=gs) ctx.drawImage(grain,x,y);
    ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
  }

  lbl.textContent=`${A.cfg.label}  →  ${B.cfg.label}`;
  if(elapsed>=total){seqIdx=(seqIdx+1)%ORDER.length;t0=now;}
  if(playing) raf=requestAnimationFrame(frame);
}

resize(); raf=requestAnimationFrame(frame);
document.getElementById('pp').onclick=function(){
  playing=!playing; this.textContent=playing?'Pause':'Play';
  if(playing){t0=performance.now();raf=requestAnimationFrame(frame);}
};
document.getElementById('nx').onclick=()=>{manualNext=true; if(!playing){playing=true;document.getElementById('pp').textContent='Pause';raf=requestAnimationFrame(frame);}};
</script>
</body>
</html>
