<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Iridescent Halo Orb</title>
<style>
  :root{ --proj:'Iridescent Halo Orb'; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:#0d0d0f; color:#e8e8ea; overflow:hidden;
    font-family:"One UI Sans","OneUI Sans","Samsung Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif; }

  /* 상단 바 */
  .topbar{ position:fixed; top:0; left:0; right:0; height:52px; z-index:40; display:flex; align-items:center; justify-content:space-between;
    padding:0 14px; background:rgba(18,18,22,.85); border-bottom:1px solid #26262b; backdrop-filter:blur(8px); }
  .brand{ display:flex; align-items:baseline; gap:8px; }
  .brand .name{ font-size:14px; font-weight:600; letter-spacing:.2px; }
  .brand .ver{ font-size:11px; color:#7bd0b0; }
  .topbtns{ display:flex; gap:6px; flex-wrap:wrap; }
  .topbtns button{ background:#232329; color:#e8e8ea; border:1px solid #34343c; border-radius:9px; padding:7px 9px; font-size:12px; cursor:pointer; white-space:nowrap; }
  .topbtns button:active{ background:#2c2c34; }
  .topbtns button.rnd{ background:#6c5cf0; color:#fff; border-color:#6c5cf0; font-weight:600; }
  .topbtns button.rec.active{ background:#ff3b30; color:#fff; border-color:#ff3b30; }

  /* 무대 + 키스크린 */
  .stage{ position:fixed; top:52px; left:0; right:0; bottom:0; display:flex; align-items:center; justify-content:center;
    transition:padding .25s ease; }
  body.lp-open .stage{ padding-left:300px; }
  body.rp-open .stage{ padding-right:300px; }
  @media (max-width:900px){ body.lp-open .stage{ padding-left:0; } body.rp-open .stage{ padding-right:0; } }
  .canvas-wrap{ position:relative; width:360px; height:760px; max-height:90vh; aspect-ratio:360/760;
    border-radius:26px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,.55); }
  canvas#view{ display:block; width:100%; height:100%; border-radius:26px; }
  .rec-dot{ position:absolute; top:12px; left:12px; display:none; align-items:center; gap:6px; font-size:12px; color:#fff;
    background:rgba(0,0,0,.4); padding:4px 10px; border-radius:999px; }
  .rec-dot.on{ display:flex; } .rec-dot .blink{ width:9px;height:9px;border-radius:50%;background:#ff3b30;animation:blink 1s steps(2,start) infinite; }
  @keyframes blink{ 50%{opacity:.15;} }

  /* 패널 공통 */
  .panel{ position:fixed; top:52px; bottom:0; width:300px; background:#141417; z-index:30; overflow-y:auto; padding:0 0 40px;
    transition:transform .25s ease; }
  .panel.left{ left:0; border-right:1px solid #26262b; }
  .panel.right{ right:0; border-left:1px solid #26262b; }
  body:not(.lp-open) .panel.left{ transform:translateX(-100%); }
  body:not(.rp-open) .panel.right{ transform:translateX(100%); }
  .phead{ position:sticky; top:0; background:#161619; display:flex; align-items:center; justify-content:space-between;
    padding:12px 14px; border-bottom:1px solid #26262b; z-index:2; }
  .phead h2{ font-size:13px; margin:0; }
  .phead .dd{ background:none; border:1px solid #34343c; color:#e8e8ea; border-radius:8px; width:30px; height:26px; cursor:pointer; }
  .pbody{ padding:12px 14px; }
  .panel.collapsed .pbody{ display:none; }

  .sec-title{ font-size:11px; letter-spacing:.4px; text-transform:uppercase; color:#7b7b85; margin:14px 0 8px; }
  .row{ margin-bottom:11px; }
  .row label{ display:flex; justify-content:space-between; align-items:baseline; font-size:12px; color:#b9b9c0; margin-bottom:5px; }
  .row label .val{ font-variant-numeric:tabular-nums; color:#f0c45a; font-size:11px; }
  .row label .num{ width:64px; background:#0f0f12; border:1px solid #2a2a31; color:#f0c45a; border-radius:6px; padding:3px 6px; font-size:11px; text-align:right; font-variant-numeric:tabular-nums; -moz-appearance:textfield; }
  .row label .num::-webkit-outer-spin-button,.row label .num::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  input[type=range]{ width:100%; -webkit-appearance:none; appearance:none; height:4px; border-radius:4px; background:#2c2c33; outline:none; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:16px;height:16px;border-radius:50%;background:#f0c45a;border:2px solid #141417;cursor:pointer; }
  input[type=range]::-moz-range-thumb{ width:16px;height:16px;border-radius:50%;background:#f0c45a;border:2px solid #141417;cursor:pointer; }
  .btns{ display:flex; gap:7px; flex-wrap:wrap; margin:8px 0; }
  button.b{ flex:1 1 auto; background:#232329; color:#e8e8ea; border:1px solid #34343c; border-radius:9px; padding:9px 8px; font-size:12px; cursor:pointer; }
  button.b:active{ background:#2c2c34; } button.b.on{ background:#f0c45a; color:#1a1206; border-color:#f0c45a; font-weight:600; }
  button.b.acc{ background:#1f6f5c; color:#dffff2; border-color:#2a8f76; }
  button.b.acc2{ background:#3a3560; color:#d9d2ff; border-color:#574d8f; }
  input[type=text],textarea,input[type=color]{ width:100%; background:#0f0f12; color:#e8e8ea; border:1px solid #2a2a31; border-radius:9px; padding:8px; font:12px/1.4 inherit; }
  textarea#codeBox{ height:84px; color:#cfe8d8; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:11px; resize:vertical; }
  input[type=color]{ height:34px; padding:2px; }

  /* 탭 */
  .tabbar{ display:flex; gap:4px; flex-wrap:wrap; margin-bottom:8px; }
  .tabbar button{ flex:1 1 auto; background:#1c1c21; color:#aeaeb6; border:1px solid #2c2c33; border-radius:8px; padding:7px 4px; font-size:11px; cursor:pointer; }
  .tabbar button.on{ background:#f0c45a; color:#1a1206; border-color:#f0c45a; font-weight:600; }
  .tabpane{ display:none; } .tabpane.on{ display:block; }
  .swatches{ display:flex; gap:5px; margin:8px 0; } .swatches i{ flex:1; height:16px; border-radius:4px; }
  .pal-name{ font-size:11px; color:#7bd0b0; margin:2px 0 0; }
  .note{ font-size:10px; color:#6b6b73; margin:4px 0 0; }
  .scrub-row{ display:flex; align-items:center; gap:8px; margin-top:8px; }
  .scrub-row input[type=checkbox]{ accent-color:#f0c45a; } .scrub-row .lp{ font-size:11px; color:#b9b9c0; }
</style>
</head>
<body class="lp-open rp-open">
  <div class="topbar">
    <div class="brand"><span class="name">Iridescent Halo Orb</span><span class="ver">v1.0</span></div>
    <div class="topbtns">
      <button id="rndBtn" class="rnd">🎲 전체 랜덤</button>
      <button id="pngBtn">PNG</button>
      <button id="recBtn" class="rec">● REC</button>
      <button id="copyBtn">📋 코드</button>
      <button id="htmlBtn">HTML</button>
      <button id="playBtn">⏸</button>
      <button id="resetBtn">↺</button>
    </div>
  </div>

  <div class="stage">
    <div class="canvas-wrap">
      <canvas id="view" width="720" height="1520"></canvas>
      <div class="rec-dot" id="recDot"><span class="blink"></span> REC</div>
    </div>
  </div>

  <!-- 좌: 폰트 패널 -->
  <div class="panel left" id="leftPanel">
    <div class="phead"><h2>폰트 (Samsung Sharp Sans)</h2><button class="dd" data-panel="leftPanel">▾</button></div>
    <div class="pbody" id="fontBody"></div>
  </div>

  <!-- 우: 전체 파라미터 패널 -->
  <div class="panel right" id="rightPanel">
    <div class="phead"><h2>파라미터</h2><button class="dd" data-panel="rightPanel">▾</button></div>
    <div class="pbody">
      <div class="tabbar" id="tabbar"></div>
      <div id="tabs"></div>
    </div>
  </div>

<script>
/* ===================== 파라미터 ===================== */
const PARAMS = {
  orbSize:{def:0.60,min:0.12,max:1.20,step:0.005}, blobAmt:{def:0.10,min:0,max:0.35,step:0.01},
  blobLobes:{def:3,min:2,max:8,step:1}, blobSpeed:{def:0.5,min:0,max:3,step:0.05},
  shapeRound:{def:0.10,min:0,max:1,step:0.02}, shapeRot:{def:24,min:0,max:180,step:1}, shapeSides:{def:0,min:0,max:6,step:1},
  distortAmt:{def:0.0,min:0,max:0.45,step:0.01}, distortFreq:{def:5,min:1,max:12,step:1},
  edgeAC:{def:15,min:0,max:360,step:1}, edgeAW:{def:45,min:8,max:120,step:1},
  edgeBC:{def:210,min:0,max:360,step:1}, edgeBW:{def:60,min:8,max:120,step:1},
  edgeContrast:{def:0.88,min:0,max:1,step:0.01}, blurAmt:{def:0.12,min:0.02,max:0.26,step:0.005}, compRot:{def:0,min:0,max:360,step:1},
  lightSize:{def:0.30,min:0.05,max:0.85,step:0.005}, lightReach:{def:0.30,min:0.05,max:1.20,step:0.01},
  lightAmt:{def:0.55,min:0,max:1.6,step:0.01}, lightUneven:{def:0.65,min:0,max:1,step:0.02},
  outerSize:{def:0.55,min:0.2,max:1.3,step:0.01}, outerAmt:{def:0.25,min:0,max:1.0,step:0.01},
  hue:{def:0,min:-180,max:180,step:1}, haloMix:{def:0.72,min:0,max:1,step:0.02}, intensity:{def:1.0,min:0,max:2,step:0.01},
  exposure:{def:0.96,min:0.4,max:1.4,step:0.01}, haloOuter:{def:0.66,min:0.40,max:0.95,step:0.01}, falloff:{def:1.8,min:0.5,max:4,step:0.05},
  rot:{def:12,min:0,max:60,step:1}, breath:{def:0.05,min:0,max:0.20,step:0.005},
};
const LABELS = {
  orbSize:'형태 크기', blobAmt:'형태 자유도', blobLobes:'형태 복잡도', blobSpeed:'형태 변화 속도', shapeRound:'모서리 둥글기', shapeRot:'형태 회전(°/s)', shapeSides:'다각형(0=유기형)',
  distortAmt:'외곽 왜곡 세기', distortFreq:'왜곡 빈도',
  edgeAC:'엣지A 위치(°)', edgeAW:'엣지A 폭(±°)', edgeBC:'엣지B 위치(°)', edgeBW:'엣지B 폭(±°)', edgeContrast:'엣지 대비', blurAmt:'블러 세기', compRot:'구성 회전(°)',
  lightSize:'빛 코어 크기', lightReach:'빛 길이(번짐)', lightAmt:'빛 세기', lightUneven:'빛 불균등', outerSize:'외곽 빛 크기', outerAmt:'외곽 빛 세기',
  hue:'색조(hue °)', haloMix:'색 선명도', intensity:'할로 강도', exposure:'밝기', haloOuter:'할로 크기', falloff:'할로 폴오프', rot:'할로 회전(°/s)', breath:'호흡'
};
const TABS=['형태','엣지','라이팅','컬러','모션','코드'];
const SECTIONS=[
  {tab:'형태', title:'중앙 형태 (유기형)', keys:['orbSize','blobAmt','blobLobes','blobSpeed','shapeRound','shapeRot','shapeSides'], buttons:'form'},
  {tab:'형태', title:'외곽 왜곡', keys:['distortAmt','distortFreq']},
  {tab:'엣지', title:'엣지 / 블러 위치', keys:['edgeAC','edgeAW','edgeBC','edgeBW','edgeContrast','blurAmt'], buttons:'edgeToggles'},
  {tab:'엣지', title:'엣지 구성 (3:2:1 랜덤)', keys:['compRot'], buttons:'edgeComp'},
  {tab:'라이팅', title:'라이팅 (앰비언트)', keys:['lightSize','lightReach','lightAmt','lightUneven','outerSize','outerAmt']},
  {tab:'컬러', special:'palette'},
  {tab:'컬러', title:'컬러 / 할로', keys:['hue','haloMix','intensity','exposure','haloOuter','falloff']},
  {tab:'모션', title:'모션', keys:['rot','breath'], buttons:'motion'},
  {tab:'코드', special:'code'},
];

/* ===================== 폰트 ===================== */
const FONTP = { size:{def:26,min:8,max:160,step:1}, alpha:{def:1,min:0,max:1,step:0.02},
  x:{def:0.5,min:0,max:1,step:0.005}, y:{def:0.86,min:0,max:1,step:0.005},
  shadowBlur:{def:8,min:0,max:40,step:1}, shadowX:{def:0,min:-30,max:30,step:1}, shadowY:{def:2,min:-30,max:30,step:1}, shadowAlpha:{def:0.5,min:0,max:1,step:0.02} };
const FONTL = { size:'크기(pt)', alpha:'투명도', x:'X 위치', y:'Y 위치', shadowBlur:'그림자 블러', shadowX:'그림자 X', shadowY:'그림자 Y', shadowAlpha:'그림자 투명도' };
/* 페이지(텍스트) 시스템 — 페이지마다 고유 폰트/텍스트 */
function newPage(text){ const pg={text:text||'',color:'#2a2a2a',align:'center',shadowOn:false}; Object.keys(FONTP).forEach(k=>pg[k]=FONTP[k].def); return pg; }
let pages=[newPage('Hey!')]; let activePage=0; let FONT=pages[0];

/* ===================== 팔레트 (AI 5색 상시 포함) ===================== */
function hexToRGB(h){ h=h.replace('#',''); return [parseInt(h.slice(0,2),16)/255,parseInt(h.slice(2,4),16)/255,parseInt(h.slice(4,6),16)/255]; }
function rgbHex(c){ return '#'+c.map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join(''); }
function makePalette(cols,n){ const rgb=cols.map(hexToRGB); const out=[]; for(let i=0;i<n;i++){ const t=i/n*cols.length; const a=Math.floor(t)%cols.length,b=(a+1)%cols.length,f=t-Math.floor(t);
  out.push(rgbHex([0,1,2].map(k=>(rgb[a][k]+(rgb[b][k]-rgb[a][k])*f)*255))); } return out; }
const AI5=['#FF8D7A','#C2B2FF','#8BBDFF','#88E6E3','#F0F488'];
const PALETTES=[
  { name:'AI', stops:makePalette(AI5,12) },
  { name:'Iridescent', stops:['#F2B244','#EDD960','#EDD960','#DEE09F','#E2B98B','#DAC9B5','#D8BEC9','#E4A2BE','#E85BA0','#E99267','#E07237','#E47B39'] },
  { name:'Sunset', stops:['#FFC24B','#FF9A56','#FF6F61','#FF5C8A','#E85BA0','#C45BD0','#F06C8A','#FFB347','#FF8C69','#FF5E78','#D45BC0','#FF7E5F'] },
  { name:'Aurora', stops:['#7CF5C2','#5CE0E8','#5AB0F0','#7E8CF0','#A86CF0','#D06CE0','#6CE0B0','#9CF0A0','#C8F08C','#7CE0D0','#5CC8E8','#8C9CF0'] },
  { name:'Ocean', stops:['#5AD2F0','#56B8E8','#4F9AE0','#6C8CF0','#5CC8C0','#7CE0D8','#9CE8F0','#5AB0E8','#4F86D0','#6CA8F0','#5CD0D8','#8CD8F0'] },
];
let palIdx=0;

/* ===================== 상태 ===================== */
const state={}; Object.keys(PARAMS).forEach(k=>state[k]=PARAMS[k].def);
state.edgeAOn=1; state.edgeBOn=1; state.genArcs=[];
let codeReady=false;
const RATIOS=[[3,2,1],[2,1,1],[1,1,1],[4,2,1]]; let ratioIdx=0;
function generateEdges(){ const ratio=RATIOS[ratioIdx],sum=ratio.reduce((a,b)=>a+b,0); let acc=0; const arcs=[],gap=6;
  for(let i=0;i<ratio.length;i++){ const size=ratio[i]/sum*360; arcs.push({relC:acc+size/2,hw:Math.max(size/2-gap,6),on:(Math.random()<0.6?1:0)}); acc+=size; }
  if(!arcs.some(a=>a.on)) arcs[Math.floor(Math.random()*arcs.length)].on=1; state.genArcs=arcs; }
const genFlatU=new Float32Array(12);
function uploadGen(){ for(let i=0;i<4;i++){ const a=state.genArcs[i];
  if(a){ genFlatU[i*3]=((a.relC+state.compRot)%360+360)%360; genFlatU[i*3+1]=a.hw; genFlatU[i*3+2]=a.on; } else { genFlatU[i*3]=genFlatU[i*3+1]=genFlatU[i*3+2]=0; } } }
function lerp(a,b,t){ return a+(b-a)*t; }
function rand(a,b){ return a+Math.random()*(b-a); }

/* ===================== WebGL (오프스크린) ===================== */
const glCanvas=document.createElement('canvas'); glCanvas.width=720; glCanvas.height=1520;
const gl=glCanvas.getContext('webgl',{preserveDrawingBuffer:true,antialias:true});
const view=document.getElementById('view'); const vctx=view.getContext('2d');
if(!gl){ alert('이 브라우저는 WebGL을 지원하지 않습니다.'); }

const VERT=`attribute vec2 a_pos; void main(){ gl_Position=vec4(a_pos,0.0,1.0); }`;
const FRAG=`
precision highp float;
uniform vec2 u_res; uniform vec2 u_center; uniform float u_radius;
uniform float u_shapeSides,u_shapeRound,u_shapeAngle,u_blobAmt,u_blobLobes,u_blobSpeed,u_distortAmt,u_distortFreq;
uniform vec2 u_edgeA,u_edgeB; uniform float u_edgeAOn,u_edgeBOn; uniform vec3 u_gen[4];
uniform float u_sharpFeather,u_blurFeather,u_lightSize,u_lightReach,u_lightAmt,u_lightUneven,u_outerSize,u_outerAmt;
uniform float u_glowSpread,u_haloInner,u_haloOuter,u_falloff,u_intensity,u_angle,u_hue,u_exposure,u_haloMix,u_t;
uniform vec3 u_bg; uniform vec3 u_stops[12];
const float PI=3.14159265359;
float adist(float a,float b){ float d=abs(mod(a-b,360.0)); return min(d,360.0-d); }
vec3 haloColor(float deg){ float a=mod(deg,360.0)/30.0; vec3 col=u_stops[0];
  for(int i=0;i<12;i++){ float lo=float(i); if(a>=lo&&a<lo+1.0){ vec3 c0=u_stops[i]; vec3 c1=(i==11)?u_stops[0]:u_stops[i+1]; col=mix(c0,c1,a-lo);} } return col; }
vec3 hueShift(vec3 c,float deg){ float a=radians(deg),ca=cos(a),sa=sin(a);
  float Y=dot(c,vec3(0.299,0.587,0.114)),I=dot(c,vec3(0.596,-0.274,-0.322)),Q=dot(c,vec3(0.211,-0.523,0.312));
  float I2=I*ca-Q*sa,Q2=I*sa+Q*ca; return vec3(Y+0.956*I2+0.621*Q2,Y-0.272*I2-0.647*Q2,Y-1.106*I2+1.703*Q2); }
float shapeBoundary(float th,float R){ float thr=th-u_shapeAngle; float br;
  if(u_shapeSides<2.5){ br=R; } else { float ang=2.0*PI/u_shapeSides; float tt=mod(thr,ang)-ang*0.5; br=R*cos(PI/u_shapeSides)/cos(tt); br=mix(br,R,u_shapeRound); }
  float ts=u_t*u_blobSpeed;
  float blob=u_blobAmt*(0.55*sin(u_blobLobes*thr+ts)+0.30*sin((u_blobLobes+2.0)*thr-ts*0.8+1.3)+0.15*sin((u_blobLobes+5.0)*thr+ts*0.55+4.2));
  float dphi=u_distortAmt*(0.6*sin(u_distortFreq*thr+1.6*sin(u_t*0.5))+0.4*sin((u_distortFreq+3.0)*thr+1.2*sin(u_t*0.37+2.0)));
  return br*(1.0+blob+dphi); }
void main(){
  vec2 p=vec2(gl_FragCoord.x,u_res.y-gl_FragCoord.y); vec2 c=u_center*u_res; vec2 d=p-c; float r=length(d); float W=u_res.x;
  float R=u_radius*W, innerPx=u_haloInner*W, outerPx=u_haloOuter*W, spreadPx=u_glowSpread*W;
  float angBase=mod(degrees(atan(-d.y,d.x)),360.0); float th=atan(d.y,d.x); float rb=shapeBoundary(th,R);
  const float SOFT=14.0;
  float eA=(1.0-smoothstep(u_edgeA.y-SOFT,u_edgeA.y+SOFT,adist(angBase,u_edgeA.x)))*u_edgeAOn;
  float eB=(1.0-smoothstep(u_edgeB.y-SOFT,u_edgeB.y+SOFT,adist(angBase,u_edgeB.x)))*u_edgeBOn;
  float edgeness=max(eA,eB);
  for(int i=0;i<4;i++){ if(u_gen[i].z>0.5){ float eg=1.0-smoothstep(u_gen[i].y-SOFT,u_gen[i].y+SOFT,adist(angBase,u_gen[i].x)); edgeness=max(edgeness,eg); } }
  float featPx=mix(u_blurFeather*W,u_sharpFeather*W,edgeness);
  float bgGrad=1.0-smoothstep(0.0,0.95*W,r); vec3 color=mix(u_bg*0.93,u_bg+vec3(0.03,0.03,0.025),bgGrad);
  vec3 hc=clamp(hueShift(haloColor(mod(angBase+u_angle,360.0)),u_hue),0.0,1.0);
  float core=u_lightSize*W, reach=max(u_lightReach*W,1.0), dd=max(r-core,0.0); float lightFall=exp(-(dd*dd)/(2.0*reach*reach));

  vctx.textAlign=FONT.align; vctx.textBaseline='middle';

  vctx.fillStyle=FONT.color; const x=FONT.x*view.width, y=FONT.y*view.height, lh=px*1.2; const lines=String(FONT.text).split('\n');
