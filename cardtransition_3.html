  :root{ --proj:'Iridescent Halo Orb'; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:#0d0d0f; color:#e8e8ea; overflow:hidden;
    font-family:"One UI Sans","OneUI Sans","Samsung Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif; }

  /* 상단 바 */
  .topbar{ position:fixed; top:0; left:0; right:0; height:52px; z-index:40; display:flex; align-items:center; justify-content:space-between;
    padding:0 14px; background:rgba(18,18,22,.85); border-bottom:1px solid #26262b; backdrop-filter:blur(8px); }
  .brand{ display:flex; align-items:baseline; gap:8px; }
  .brand .name{ font-size:14px; font-weight:600; letter-spacing:.2px; }
  .brand .ver{ font-size:11px; color:#7bd0b0; }
  .topbtns{ display:flex; gap:6px; flex-wrap:wrap; }
  .topbtns button{ background:#232329; color:#e8e8ea; border:1px solid #34343c; border-radius:9px; padding:7px 9px; font-size:12px; cursor:pointer; white-space:nowrap; }
  .topbtns button:active{ background:#2c2c34; }
  .topbtns button.rnd{ background:#6c5cf0; color:#fff; border-color:#6c5cf0; font-weight:600; }
  .topbtns button.rec.active{ background:#ff3b30; color:#fff; border-color:#ff3b30; }

  /* 무대 + 키스크린 */
  .stage{ position:fixed; top:52px; left:0; right:0; bottom:0; display:flex; align-items:center; justify-content:center;
    transition:padding .25s ease; }
  body.lp-open .stage{ padding-left:300px; }
  body.rp-open .stage{ padding-right:300px; }
  @media (max-width:900px){ body.lp-open .stage{ padding-left:0; } body.rp-open .stage{ padding-right:0; } }
  .canvas-wrap{ position:relative; width:360px; height:780px; max-height:82vh; aspect-ratio:360/780;
    border-radius:92px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,.55); }
  canvas#view{ display:block; width:100%; height:100%; border-radius:92px; }
  .rec-dot{ position:absolute; top:12px; left:12px; display:none; align-items:center; gap:6px; font-size:12px; color:#fff;
    background:rgba(0,0,0,.4); padding:4px 10px; border-radius:999px; }
  .rec-dot.on{ display:flex; } .rec-dot .blink{ width:9px;height:9px;border-radius:50%;background:#ff3b30;animation:blink 1s steps(2,start) infinite; }
  @keyframes blink{ 50%{opacity:.15;} }
  .kswrap{ display:flex; flex-direction:column; align-items:center; gap:14px; }
  .navbar{ display:flex; align-items:center; gap:16px; }
  .nav{ width:42px; height:42px; border-radius:50%; background:rgba(40,40,48,.92); color:#fff; border:1px solid #3a3a44; font-size:22px; cursor:pointer; }
  .nav:active{ background:rgba(62,62,74,1); }
  .pageind{ display:flex; align-items:center; gap:8px; }
  .pageind .dot{ width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.28); cursor:pointer; transition:all .2s; }
  .pageind .dot.on{ width:22px; border-radius:4px; background:#fff; }
  .screenlabel{ margin-top:-6px; font-size:12px; letter-spacing:2px; color:#9a9aa2; }
  .screenbtns{ display:flex; gap:8px; margin-top:2px; }
  .screenbtns button{ background:rgba(40,40,48,.92); color:#cfcfd6; border:1px solid #3a3a44; border-radius:999px; padding:6px 14px; font-size:12px; cursor:pointer; transition:all .2s; }
  .screenbtns button.on{ background:#fff; color:#15151a; border-color:#fff; font-weight:600; }
  .ctxctrl{ display:flex; gap:8px; min-height:0; }
  .ctxctrl button{ background:rgba(40,40,48,.92); color:#cfcfd6; border:1px solid #3a3a44; border-radius:999px; padding:6px 14px; font-size:12px; cursor:pointer; }
  .ctxctrl button.on{ background:#6c5cf0; color:#fff; border-color:#6c5cf0; }
  #xfade{ position:absolute; inset:0; width:100%; height:100%; display:block; z-index:2; pointer-events:none; opacity:0; border-radius:92px; }
  .rec-dot{ z-index:5; }

  /* 패널 공통 */
  .panel{ position:fixed; top:52px; bottom:0; width:300px; background:#141417; z-index:30; overflow-y:auto; padding:0 0 40px;
    transition:transform .25s ease; }
  .panel.left{ left:0; border-right:1px solid #26262b; }
  .panel.right{ right:0; border-left:1px solid #26262b; }
  body:not(.lp-open) .panel.left{ transform:translateX(-100%); }
  body:not(.rp-open) .panel.right{ transform:translateX(100%); }
  .phead{ position:sticky; top:0; background:#161619; display:flex; align-items:center; justify-content:space-between;
    padding:12px 14px; border-bottom:1px solid #26262b; z-index:2; }
  .phead h2{ font-size:13px; margin:0; }
  .phead .dd{ background:none; border:1px solid #34343c; color:#e8e8ea; border-radius:8px; width:30px; height:26px; cursor:pointer; }
  .pbody{ padding:12px 14px; }
  .panel.collapsed .pbody{ display:none; }

  .sec-title{ font-size:11px; letter-spacing:.4px; text-transform:uppercase; color:#7b7b85; margin:14px 0 8px; }
  .row{ margin-bottom:11px; }
  .row label{ display:flex; justify-content:space-between; align-items:baseline; font-size:12px; color:#b9b9c0; margin-bottom:5px; }
  .row label .val{ font-variant-numeric:tabular-nums; color:#f0c45a; font-size:11px; }
  .row label .num{ width:64px; background:#0f0f12; border:1px solid #2a2a31; color:#f0c45a; border-radius:6px; padding:3px 6px; font-size:11px; text-align:right; font-variant-numeric:tabular-nums; -moz-appearance:textfield; }
  .row label .num::-webkit-outer-spin-button,.row label .num::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  input[type=range]{ width:100%; -webkit-appearance:none; appearance:none; height:4px; border-radius:4px; background:#2c2c33; outline:none; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:16px;height:16px;border-radius:50%;background:#f0c45a;border:2px solid #141417;cursor:pointer; }
  input[type=range]::-moz-range-thumb{ width:16px;height:16px;border-radius:50%;background:#f0c45a;border:2px solid #141417;cursor:pointer; }
  .btns{ display:flex; gap:7px; flex-wrap:wrap; margin:8px 0; }
  button.b{ flex:1 1 auto; background:#232329; color:#e8e8ea; border:1px solid #34343c; border-radius:9px; padding:9px 8px; font-size:12px; cursor:pointer; }
  button.b:active{ background:#2c2c34; } button.b.on{ background:#f0c45a; color:#1a1206; border-color:#f0c45a; font-weight:600; }

uniform float u_fxAmt;                             // 효과 게이트 0(낙하 중·흰색만)→1(정착 후·컬러+라이트 등장)
uniform vec3 u_centerCol;                          // 중앙 채움 전용 색상(직접 수정)
uniform float u_centerSize, u_centerOp;            // 중앙 채움 크기(반경 스케일) / 불투명도(농도)
uniform float u_dropOp;                             // 등장 opacity 0(투명)→1(불투명) — 낙하 중 페이드 인
uniform vec3 u_cardC1,u_cardC2,u_cardC3;          // 카드색 1·2·3
// 카드 안쪽 엣지 그라데이션 마스크 레이어(최대 4) + 카드 외곽 형태 opacity 마스크
uniform float u_clN; uniform float u_clType[4],u_clInt[4],u_clWidth[4]; uniform vec3 u_clC1[4],u_clC2[4],u_clC3[4];
uniform float u_smN; uniform float u_smType[4],u_smOpacity[4],u_smBlur[4],u_smAngle[4],u_smCx[4],u_smCy[4],u_smSx[4],u_smSy[4],u_smInv[4];  // 형태 마스크 레이어(0 Linear/1 Radial/2 Ellipse)
uniform float u_fbAmt,u_fbSize,u_fbSpeed;   // 부유 블러(카드 안에서 자유 이동)
// ===== Transition: 라이트 레이어(0=외곽,1=내부) =====
uniform float u_transOn;
uniform float u_lN; uniform float u_lType[6],u_lMode[6],u_lSweep[6],u_lDir[6],u_lSpin[6],u_lBright[6],u_lInten[6],u_lWidth[6],u_lThick[6],u_lBlur[6],u_lSpeed[6],u_lSize[6],u_lGlow[6],u_lSoft[6],u_lShadow[6],u_lAngle[6];
uniform vec3 u_lCol[6],u_lBlurCol[6],u_lShadCol[6];

uniform float u_iriOn,u_iriInt,u_iriHue,u_iriHueShift,u_iriSat,u_iriSharp,u_iriWobble,u_iriDir;
// ===== SurfaceFX (Rim/Glint/Sweep/Eyes — 각 int,width,size + color) =====
uniform float u_sfxOn;
uniform float u_rimN; uniform float u_rimInt[3],u_rimW[3],u_rimS[3],u_rimSpd[3]; uniform vec3 u_rimC[3];   // Rim 레이어
uniform float u_glintInt,u_glintW,u_glintS; uniform vec3 u_glintC;
uniform float u_swN; uniform float u_swInt[3],u_swW[3],u_swS[3],u_swSpd[3],u_swAng[3]; uniform vec3 u_swC[3];   // Sweep 레이어(angle=사선 방향)
uniform float u_eyeInt,u_eyeW,u_eyeS; uniform vec3 u_eyeC;
// ===== Inner FX =====
uniform float u_innOn,u_innPulse,u_innCaustics,u_innFlare;
vec2 dirVec(float di){ if(di<0.5) return vec2(0.0,-1.0); else if(di<1.5) return vec2(0.0,1.0);
  else if(di<2.5) return vec2(-1.0,0.0); else if(di<3.5) return vec2(1.0,0.0);
  else if(di<4.5) return normalize(vec2(-1.0,-1.0));   // ↖ 좌상
  else if(di<5.5) return normalize(vec2(1.0,-1.0));    // ↗ 우상
  else if(di<6.5) return normalize(vec2(1.0,1.0));     // ↘ 상단좌측→우측하단
  else return normalize(vec2(-1.0,1.0)); }             // ↙ 상단우측→좌측하단
vec3 hueRot(vec3 c,float deg){ float a=radians(deg),ca=cos(a),sa=sin(a);
  float Y=dot(c,vec3(0.299,0.587,0.114)),I=dot(c,vec3(0.596,-0.274,-0.322)),Q=dot(c,vec3(0.211,-0.523,0.312));
  float I2=I*ca-Q*sa,Q2=I*sa+Q*ca; return clamp(vec3(Y+0.956*I2+0.621*Q2,Y-0.272*I2-0.647*Q2,Y-1.106*I2+1.703*Q2),0.0,1.0); }
vec3 satAdj(vec3 c,float s){ float l=dot(c,vec3(0.299,0.587,0.114)); return clamp(mix(vec3(l),c,s),0.0,1.0); }
vec3 iriPal(float t){ return 0.5+0.5*cos(6.28318*(t+vec3(0.0,0.33,0.67))); }
// 3색을 끊김 없이 부드럽게 연결 — 세그먼트 보간(경계에서 같은 색이 만나 자연스러운 그라데이션)
vec3 grad3(vec3 a,vec3 b,vec3 c,float t){ t=clamp(t,0.0,1.0); float u=smoothstep(0.0,1.0,t); return u<0.5? mix(a,b,u*2.0) : mix(b,c,(u-0.5)*2.0); }
vec3 conic3(vec3 a,vec3 b,vec3 c,float g){ g=mod(g,1.0)*3.0; return g<1.0? mix(a,b,g) : (g<2.0? mix(b,c,g-1.0) : mix(c,a,g-2.0)); } // 끝→처음 순환 연결(seam 없음)
vec3 cardTintCol(vec2 lp){ if(u_cardType<0.5) return u_cardC1;                                  // 0 솔리드
  if(u_cardType<1.5){ float gx=clamp(0.5+(lp.x+lp.y)/(u_cardH.x+u_cardH.y+1e-4),0.0,1.0); return grad3(u_cardC1,u_cardC2,u_cardC3,gx); }  // 1 리니어(3색 부드럽게)
  if(u_cardType<2.5){ float rr=clamp(length(lp/(u_cardH+1e-4)),0.0,1.0); return grad3(u_cardC1,u_cardC2,u_cardC3,rr); }  // 2 래디얼(3색 부드럽게)
  float gg=mod(atan(lp.y,lp.x)/6.28318+0.5,1.0); return conic3(u_cardC1,u_cardC2,u_cardC3,gg); }  // 3 그라데이션(conic, seam 없음)
float h21(vec2 p){ p=fract(p*vec2(123.34,345.45)); p+=dot(p,p+34.345); return fract(p.x*p.y); }
float gnoise(vec2 p){ vec2 i=floor(p),f=fract(p); float a=h21(i),b=h21(i+vec2(1.,0.)),c=h21(i+vec2(0.,1.)),d=h21(i+vec2(1.,1.)); vec2 u=f*f*(3.0-2.0*f); return mix(mix(a,b,u.x),mix(c,d,u.x),u.y); }
float gfbm(vec2 p){ float v=0.0,amp=0.5; for(int i=0;i<4;i++){ v+=amp*gnoise(p); p=p*2.0+vec2(11.3,7.1); amp*=0.5; } return v; }
vec3 gpal(float t){ vec3 a=vec3(0.80,0.74,0.70),b=vec3(0.22,0.20,0.22),c=vec3(1.0),d=vec3(0.0,0.20,0.45); return a+b*cos(6.28318*(c*t+d)); }
vec3 lightTint(float t){ vec3 c=0.5+0.5*cos(6.28318*(t+vec3(0.0,0.33,0.67))); return mix(vec3(1.0),c,0.72); }
float sdRB(vec2 p,vec2 c,vec2 h,float rt,float rb){ vec2 q=p-c; float r=(q.y<0.0)?rt:rb;
  vec2 d=abs(q)-h+r; return min(max(d.x,d.y),0.0)+length(max(d,vec2(0.0)))-r; }
float sdC(vec2 p,vec2 c,float r){ return length(p-c)-r; }
float scene(vec2 p){ float d=sdRB(p,u_cardC,u_cardH,u_cardRT,u_cardRB);
  if(u_icons>0.5){ for(int i=0;i<4;i++) d=min(d,sdC(p,u_circ[i],u_circR)); } return d; }
vec2 nrm(vec2 p){ float e=0.0012;
  float dx=scene(p+vec2(e,0.0))-scene(p-vec2(e,0.0));
  float dy=scene(p+vec2(0.0,e))-scene(p-vec2(0.0,e));
  return normalize(vec2(dx,dy)+1e-6); }
vec3 smp(vec2 uvT){ return texture2D(u_bg, vec2(uvT.x, 1.0-uvT.y)).rgb; }
vec3 frost(vec2 uvT,float rad){ vec3 acc=vec3(0.0); float ar=u_res.x/u_res.y;
  for(int i=0;i<12;i++){ float a=float(i)*2.39996; float rr=rad*sqrt((float(i)+0.5)/12.0);
    acc+=smp(uvT+vec2(cos(a)*rr, sin(a)*rr*ar)); } return acc/12.0; }
void main(){
  float m=min(u_res.x,u_res.y);
  vec2 uv=gl_FragCoord.xy/u_res; vec2 uvT=vec2(uv.x,1.0-uv.y);
  vec2 P=(uvT*u_res-0.5*u_res)/m;
  // 카드 등장 애니메이션: 카드+아이콘만 이동/스케일(배경은 고정)
  vec2 Pc=(P-u_cardC)/max(u_anim.z,0.05)+u_cardC-u_anim.xy;
  float d=scene(Pc); vec2 n=nrm(Pc);
  float stl=clamp(u_settle,0.0,1.0); float ef=0.0; float fxAmt=clamp(u_fxAmt,0.0,1.0);   // 등장은 블러 없이 opacity만(ef=0) / fxAmt: 효과는 '낙하 완료 후'에만 등장
  float inside=smoothstep(0.002+ef,-0.002-ef,d);
  // 배경(고정): bg 블러만
  vec3 base = u_bgBlur>0.02 ? frost(uvT,u_bgBlur*0.02) : smp(uvT);
  // 접촉 그림자(카드 아래)
  float sh=smoothstep(0.05,-0.02, scene(Pc+vec2(0.0,-0.022)))*smoothstep(-0.015,0.03,d);
  base=mix(base,base*0.82,sh*0.45);
  // ===== 카드 = 면(플랫): 굴절/분산/리퀴드 없음, 면 블러 + 고체 채움 =====
  float dCard=sdRB(Pc,u_cardC,u_cardH,u_cardRT,u_cardRB);
  float cardRight=(dCard<0.0)?smoothstep(u_cardC.x-0.03,u_cardC.x+0.03,Pc.x):0.0;
  // 6사분면(2열×3행) 영역별 블러 — 경계는 살짝 페더링
  vec2 lz=(Pc-u_cardC)/(u_cardH+1e-4); float zb=0.0;
  for(int z=0;z<6;z++){ int col=z-(z/2)*2; int row=z/2;
    float cmask=(col==0)? smoothstep(0.07,-0.07,lz.x) : smoothstep(-0.07,0.07,lz.x);
    float ry0=float(row)*0.66667-1.0, ry1=ry0+0.66667;
    float rmask=smoothstep(ry0-0.07,ry0+0.07,lz.y)*smoothstep(ry1+0.07,ry1-0.07,lz.y);
    zb+=u_zoneBlur[z]*cmask*rmask; }
  // 부유 블러: 카드 안에서 자유롭게 떠다니는 블러 블롭(Lissajous=자유 방향)
  if(u_fbAmt>0.001){ float ft=u_time*u_fbSpeed;
    vec2 fp=u_cardC+vec2(0.62*u_cardH.x*sin(ft*0.5)+0.22*u_cardH.x*sin(ft*0.23+2.0), 0.62*u_cardH.y*sin(ft*0.37+1.3)+0.22*u_cardH.y*sin(ft*0.19+4.0));
    float fdd=distance(Pc,fp), fsz=max(u_fbSize,0.05)*u_cardH.y;
    zb+=u_fbAmt*exp(-fdd*fdd/(fsz*fsz)); }
  float bodyRad=u_frost*0.012 + cardRight*u_quad*0.05 + zb*0.05;   // 전역 + 우측 + 6사분면 + 부유 (내려올 때 추가 블러 제거)
  vec3 body=frost(uvT, bodyRad);                             // 배경을 평면적으로만 블러
  vec3 tcol=(dCard<0.0)?cardTintCol(Pc-u_cardC):u_cardC1;
  vec3 cFill=mix(tcol, u_centerCol, clamp(u_centerFill,0.0,1.0)*clamp(u_centerOp,0.0,1.0));   // 중앙 채움 색상(opacity=농도, 직접 수정)
  float rTint=1.0; if(u_centerFill>0.001){ vec2 lc2=(Pc-u_cardC)/(u_cardH+1e-4); float rr=length(lc2)/max(u_centerSize,0.05); rTint=mix(1.0, 1.0-smoothstep(0.1,1.05,rr), clamp(u_centerFill,0.0,1.0)); }  // 중앙 집중(size=영역 크기 / 외곽=배경 블러)
  vec3 fillCol=mix(vec3(1.0), cFill, fxAmt);   // 도착 전: 흰색만 / 도착 후: 중앙 채움색
  float fillAmt=clamp(0.18+0.82*u_tint,0.0,1.0)*rTint;
  fillAmt=mix(1.0, fillAmt, fxAmt);   // 낙하 중(fxAmt=0): 배경블러 섞임 제거 → 카드 전체 흰색 / 도착 후: 중앙 집중+외곽 배경 블러
  vec3 col=mix(body, fillCol, fillAmt);
  col=mix(vec3(dot(col,vec3(0.333))), col, 0.86);
  col=mix(col, mix(col,vec3(1.0),0.10), cardRight*u_quad*0.7);
  col*=1.0-0.10*exp(-pow(max(-d,0.0)/0.02,2.0));
  // ===== 카드 외곽 형태 opacity 마스크 (레이어: Linear / Radial / Ellipse, invert 가능) =====
  float shapeM=1.0;
  for(int si=0; si<4; si++){ if(float(si)>=u_smN) break;
    vec2 lnm=(Pc-u_cardC)/(u_cardH+1e-4); float gms;
    if(u_smType[si]<0.5){ float am=radians(u_smAngle[si]); gms=0.5+0.5*dot(lnm,vec2(cos(am),sin(am))); }                       // Linear
    else if(u_smType[si]<1.5){ gms=clamp(distance(lnm,vec2(u_smCx[si],u_smCy[si]))/max(u_smSx[si],0.05),0.0,1.4); }            // Radial
    else { float am=radians(u_smAngle[si]); vec2 q=lnm-vec2(u_smCx[si],u_smCy[si]); vec2 rr=vec2(q.x*cos(am)+q.y*sin(am), -q.x*sin(am)+q.y*cos(am)); gms=length(rr/vec2(max(u_smSx[si],0.05),max(u_smSy[si],0.05))); }  // Ellipse(부분 타원)
    float mk=smoothstep(1.0, 1.0-max(u_smBlur[si],0.02), gms);
    if(u_smInv[si]>0.5) mk=1.0-mk;

  inside*=shapeM;
  // 낙하 중에도 카드는 불투명 흰색(배경 비침 제거) — 부드러움은 가장자리 soft edge(ef)로만 표현
  vec3 outc=mix(base,col,inside*clamp(u_cardAlpha,0.0,1.0)*clamp(u_dropOp,0.0,1.0));   // 카드 알파 × 등장 opacity(낙하 중 페이드 인, 블러/흰색엣지 없음)

  vec2 ln=(Pc-u_cardC)/(u_cardH+1e-4);   // 카드 로컬 좌표(중심0, 가장자리 ±1)

  // ===== 카드 안쪽 엣지 그라데이션 마스크 레이어 =====
  for(int ci=0; ci<4; ci++){ if(float(ci)>=u_clN) break;
    float w=max(u_clWidth[ci],0.02);
    float em=(1.0-smoothstep(0.0, w*0.12, max(-d,0.0)))*inside;   // 안쪽 엣지에서 강 → 안으로 약
    vec3 cc;
    if(u_clType[ci]<0.5) cc=u_clC1[ci];
    else if(u_clType[ci]<1.5){ float gg=mod(atan(ln.y,ln.x)/6.28318+0.5,1.0); cc=conic3(u_clC1[ci],u_clC2[ci],u_clC3[ci],gg); }   // 그라데이션(seam 없음)
    else { float rr=clamp(length(ln),0.0,1.0); cc=grad3(u_clC1[ci],u_clC2[ci],u_clC3[ci],rr); }   // 래디얼(3색 부드럽게)

      float spd=u_lSpeed[k], t=u_time*spd, ang0=radians(u_lAngle[k]);
      float wid=max(u_lWidth[k],0.03), blr=max(u_lBlur[k],0.05), sz=max(u_lSize[k],0.1);
      float V=wid*wid*blr + 1e-4;
      float f=0.0, fs=0.0;
      if(u_lMode[k]<0.5){            // ORBIT: 카드 중심을 도는 빛 (회전: 0 정지 / 1 시계 / 2 반시계)
        float orbR=(0.25+0.6*sz)*u_cardH.y;
        float ph=(u_lSpin[k]<0.5)? ang0 : (u_lSpin[k]<1.5? ang0+t : ang0-t);  // +t=화면 시계방향
        vec2 lp=u_cardC+orbR*vec2(cos(ph),sin(ph));
        vec2 spp=u_cardC-orbR*vec2(cos(ph),sin(ph));

        vec2 dv=dirVec(u_lDir[k]); float ca=cos(ang0),sa=sin(ang0); dv=vec2(dv.x*ca-dv.y*sa,dv.x*sa+dv.y*ca);

      f*=loc*fxAmt; fs*=loc*fxAmt;   // 라이트도 정착 시 등장

    float pa=atan(ln.y,ln.x);
    for(int i=0;i<3;i++){ if(float(i)>=u_rimN) break;

function applyArtboard(){ const st=document.querySelector('.stage'); if(!st) return;
  const a=(artboard.alpha==null?1:artboard.alpha), sz=(artboard.size==null?100:artboard.size);
  const A=hexA(artboard.c1,a), B=hexA(artboard.c2,a), C=hexA(artboard.c3,a), ang=artboard.angle||0;
  let g;
  if(artboard.type==='solid')          g=`linear-gradient(0deg, ${A}, ${A})`;
  else if(artboard.type==='radial')    g=`radial-gradient(circle at 50% 42%, ${A} 0%, ${B} 55%, ${C} 100%)`;
  else if(artboard.type==='gradation') g=`conic-gradient(from ${ang}deg at 50% 50%, ${A}, ${B}, ${C}, ${A})`;
  else                                 g=`linear-gradient(${ang}deg, ${A} 0%, ${B} 55%, ${C} 100%)`;
  st.style.background=`${g}, #0d0d10`; st.style.backgroundSize=`${sz}% ${sz}%`; st.style.backgroundPosition='center'; }

// 적응형 텍스트 효과(#2) — adaptive-text-kiosk 값, 폰트 패널에서 조절
const ADAPT={strength:0.75, sat:2.0, mode:'lum'};
(function buildFontUI(){ const p=document.getElementById('fontBody');
  // 페이지
  const tp=document.createElement('div'); tp.className='sec-title'; tp.textContent='페이지'; p.appendChild(tp);
  pageChipsEl=document.createElement('div'); pageChipsEl.className='btns'; p.appendChild(pageChipsEl);
  const addRow=document.createElement('div'); addRow.className='btns';
  const npt=document.createElement('input'); npt.type='text'; npt.id='newPageText'; npt.placeholder='새 페이지 텍스트'; npt.style.flex='1 1 100%';
  const addBtn=document.createElement('button'); addBtn.className='b acc'; addBtn.textContent='➕ 페이지 추가';
  const delBtn=document.createElement('button'); delBtn.className='b'; delBtn.textContent='🗑 삭제';
  const doAdd=()=>{ const t=npt.value.trim()||('Page '+(pages.length+1)); npt.value=''; addPage(t); if(codeReady) refreshCode(); };
  addBtn.onclick=doAdd; npt.addEventListener('keydown',e=>{ if(e.key==='Enter') doAdd(); });
  delBtn.onclick=()=>{ delPage(); if(codeReady) refreshCode(); };
  addRow.appendChild(npt); addRow.appendChild(addBtn); addRow.appendChild(delBtn); p.appendChild(addRow);
  const t1=document.createElement('div'); t1.className='sec-title'; t1.textContent='현재 페이지 텍스트'; p.appendChild(t1);
  const ta=document.createElement('input'); ta.type='text'; ta.id='pageText'; ta.value=FONT.text; ta.placeholder='표시할 텍스트'; ta.oninput=()=>{ FONT.text=ta.value; rebuildPageChips(); if(codeReady) refreshCode(); }; p.appendChild(ta);
  const cw=document.createElement('div'); cw.style.marginTop='8px';
  const cl=document.createElement('label'); cl.style.cssText='font-size:12px;color:#b9b9c0;display:block;margin-bottom:5px'; cl.textContent='글자 색';
  const col=document.createElement('input'); col.type='color'; col.value=FONT.color; col.oninput=()=>{ FONT.color=col.value; if(codeReady) refreshCode(); };
  cw.appendChild(cl); cw.appendChild(col); p.appendChild(cw);
  // 폰트 패밀리
  const fw=document.createElement('div'); fw.style.marginTop='8px';
  const fl=document.createElement('label'); fl.style.cssText='font-size:12px;color:#b9b9c0;display:block;margin-bottom:5px'; fl.textContent='폰트';
  const fsel=document.createElement('select'); fsel.id='fontFamSel'; fsel.style.cssText='width:100%;background:#0f0f12;color:#e8e8ea;border:1px solid #2a2a31;border-radius:9px;padding:8px;font:12px/1.4 inherit;';
  ['Samsung Sharp Sans','One UI Sans'].forEach(n=>{ const o=document.createElement('option'); o.value=n; o.textContent=n; fsel.appendChild(o); });
  fsel.value=FONT.fontFamily||'Samsung Sharp Sans'; fsel.onchange=()=>{ FONT.fontFamily=fsel.value; if(codeReady) refreshCode(); };
  fw.appendChild(fl); fw.appendChild(fsel); p.appendChild(fw);
  // 두께(weight)
  const ww=document.createElement('div'); ww.style.marginTop='8px';
  const wl=document.createElement('label'); wl.style.cssText='font-size:12px;color:#b9b9c0;display:block;margin-bottom:5px'; wl.textContent='두께';
  const wsel=document.createElement('select'); wsel.id='fontWeightSel'; wsel.style.cssText='width:100%;background:#0f0f12;color:#e8e8ea;border:1px solid #2a2a31;border-radius:9px;padding:8px;font:12px/1.4 inherit;';
  [['300','Light'],['400','Regular'],['500','Medium'],['700','Bold']].forEach(([v,n])=>{ const o=document.createElement('option'); o.value=v; o.textContent=n; wsel.appendChild(o); });
  wsel.value=FONT.weight||'500'; wsel.onchange=()=>{ FONT.weight=wsel.value; if(codeReady) refreshCode(); };
  ww.appendChild(wl); ww.appendChild(wsel); p.appendChild(ww);
  // 정렬
  const t2=document.createElement('div'); t2.className='sec-title'; t2.textContent='정렬'; p.appendChild(t2);
  const ab=document.createElement('div'); ab.className='btns';
  [['left','좌'],['center','중'],['right','우']].forEach(([v,n])=>{ const b=document.createElement('button'); b.className='b'+(FONT.align===v?' on':''); b.textContent=n; b.dataset.al=v;
    b.onclick=()=>{ FONT.align=v; ab.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x.dataset.al===v)); if(codeReady) refreshCode(); }; ab.appendChild(b); });
  p.appendChild(ab);
  // 크기/투명도/위치
  const t3=document.createElement('div'); t3.className='sec-title'; t3.textContent='크기 · 투명도 · 위치'; p.appendChild(t3);
  ['size','alpha','x','y'].forEach(k=>{ fontInputs[k]=mkSlider(p,k,FONTP[k],FONTL[k],()=>FONT[k],v=>FONT[k]=v); });
  // 그림자
  const t4=document.createElement('div'); t4.className='sec-title'; t4.textContent='그림자'; p.appendChild(t4);
  const sb=document.createElement('div'); sb.className='btns'; const sh=document.createElement('button'); sh.id='shadowToggle'; sh.className='b'+(FONT.shadowOn?' on':''); sh.textContent='그림자: '+(FONT.shadowOn?'ON':'OFF');
  sh.onclick=()=>{ FONT.shadowOn=!FONT.shadowOn; sh.textContent='그림자: '+(FONT.shadowOn?'ON':'OFF'); sh.classList.toggle('on',FONT.shadowOn); if(codeReady) refreshCode(); }; sb.appendChild(sh); p.appendChild(sb);
  ['shadowBlur','shadowX','shadowY','shadowAlpha'].forEach(k=>{ fontInputs[k]=mkSlider(p,k,FONTP[k],FONTL[k],()=>FONT[k],v=>FONT[k]=v); });
  // 타이핑(한 글자씩 + 등장 블러)
  const t5=document.createElement('div'); t5.className='sec-title'; t5.textContent='타이핑 (한 글자씩 · 블러 등장)'; p.appendChild(t5);
  const tb=document.createElement('div'); tb.className='btns'; const tt=document.createElement('button'); tt.id='typeToggle'; tt.className='b'+(FONT.typing?' on':''); tt.textContent='타이핑: '+(FONT.typing?'ON':'OFF');
  tt.onclick=()=>{ FONT.typing=!FONT.typing; tt.textContent='타이핑: '+(FONT.typing?'ON':'OFF'); tt.classList.toggle('on',FONT.typing); if(codeReady) refreshCode(); }; tb.appendChild(tt); p.appendChild(tb);
  ['typeSpeed','typeBlur'].forEach(k=>{ fontInputs[k]=mkSlider(p,k,FONTP[k],FONTL[k],()=>FONT[k],v=>FONT[k]=v); });
  // 버튼
  const bd=document.createElement('div'); bd.className='btns';
  const ap=document.createElement('button'); ap.className='b on'; ap.textContent='이 화면에만 적용';
  const nx=document.createElement('button'); nx.className='b acc'; nx.textContent='다음 코드에 반영';
  ap.onclick=()=>flash(ap,'✓ 적용됨');  // 텍스트는 매 프레임 실시간 반영됨
  nx.onclick=()=>{ if(codeReady){ refreshCode(); flash(nx,'✓ 반영됨'); } };
  bd.appendChild(ap); bd.appendChild(nx); p.appendChild(bd);
  // ===== 적응형 텍스트 효과(#2) — 배경색에 따라 변하는 글자색 =====
  const at=document.createElement('div'); at.className='sec-title'; at.textContent='적응형 텍스트 (#2)'; p.appendChild(at);
  const mk=(label,key,min,max,step)=>{ const r=document.createElement('div'); r.className='row';
    const l=document.createElement('label'); const b=document.createElement('b'); b.textContent=(+ADAPT[key]).toFixed(2); l.textContent=label; l.appendChild(b);
    const s=document.createElement('input'); s.type='range'; s.min=min; s.max=max; s.step=step; s.value=ADAPT[key];
    s.style.cssText='width:100%'; s.oninput=()=>{ ADAPT[key]=+s.value; b.textContent=(+s.value).toFixed(2); };
    r.appendChild(l); r.appendChild(s); p.appendChild(r); };
  mk('대비 강도','strength',0,1,0.01);
  mk('채도 부스트','sat',0.6,2,0.01);
  const mr=document.createElement('div'); mr.className='btns';
  [['lum','Luminance'],['comp','Complement'],['white','Static White']].forEach(([v,n])=>{ const mb=document.createElement('button'); mb.className='b'+(ADAPT.mode===v?' on':''); mb.textContent=n; mb.dataset.am=v;
    mb.onclick=()=>{ ADAPT.mode=v; mr.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x.dataset.am===v)); }; mr.appendChild(mb); });
  p.appendChild(mr);
  const an=document.createElement('div'); an.className='note'; an.textContent='#2 글자색이 배경 색조를 따라가며 가독성 방향으로 밝기/채도 조절. (adaptive-text-kiosk 값)'; p.appendChild(an);
})();
function syncFontUI(){ Object.keys(fontInputs).forEach(k=>{ fontInputs[k].inp.value=FONT[k]; fontInputs[k].num.value=fmt(FONTP[k],FONT[k]); });
  document.querySelectorAll('#fontBody [data-al]').forEach(b=>b.classList.toggle('on',b.dataset.al===FONT.align));
  const tin=document.getElementById('pageText'); if(tin) tin.value=FONT.text;
  const cin=document.querySelector('#fontBody input[type=color]'); if(cin) cin.value=FONT.color;

// 모바일 감지: 뷰어가 폭을 넓게 보고하는 경우가 있어 '터치/coarse 포인터'로도 판단(폭은 보조)
function isMobileEnv(){
  try{ if(window.matchMedia && window.matchMedia('(pointer:coarse)').matches) return true; }catch(e){}
  if('ontouchstart' in window) return true;
  if(navigator.maxTouchPoints>0 || navigator.msMaxTouchPoints>0) return true;
  return (window.innerWidth||9999)<=820;
}
function applyMobile(){ const m=isMobileEnv(); document.body.classList.toggle('mobile', m);
  if(m){ ['leftPanel','rightPanel'].forEach(id=>{ const pn=document.getElementById(id); if(pn && !pn.dataset.mobInit){ pn.classList.add('collapsed'); const dd=pn.querySelector('.dd'); if(dd) dd.textContent='▸'; pn.dataset.mobInit='1'; } }); } }
applyMobile(); window.addEventListener('resize', applyMobile); window.addEventListener('orientationchange', applyMobile);
// 임베드 폰트 로드 보장 후 렌더 시작
if(document.fonts && document.fonts.load){ Promise.all([document.fonts.load('700 60px "Samsung Sharp Sans"'),document.fonts.load('500 60px "One UI Sans"')]).catch(()=>{}).finally(()=>requestAnimationFrame(frame)); }
else requestAnimationFrame(frame);
</script>
</body>
</html>
