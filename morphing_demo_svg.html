<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organic Gradient Morphing — SVG</title>
<style>
  :root { --bg: #0B0E14; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: var(--bg); color: #cdd6e4;
    font-family: -apple-system, "Helvetica Neue", "Segoe UI", system-ui, sans-serif; overflow: hidden; }
  #stage { position: fixed; inset: 0; display: grid; place-items: center; }
  svg { width: min(86vmin, 760px); height: min(86vmin, 760px); display: block; }
  .hud { position: fixed; left: 22px; bottom: 20px; font-size: 13px; letter-spacing: .04em;
    text-transform: uppercase; opacity: .7; }
  .hud b { color: #fff; font-weight: 600; }
  .ctrl { position: fixed; right: 22px; bottom: 20px; display: flex; gap: 10px; align-items: center; }
  .ctrl button { background: rgba(255,255,255,.06); color: #cdd6e4; border: 1px solid rgba(255,255,255,.12);
    border-radius: 999px; padding: 8px 16px; font-size: 12px; cursor: pointer; letter-spacing: .05em;
    text-transform: uppercase; transition: background .2s; }
  .ctrl button:hover { background: rgba(255,255,255,.14); }
  .vignette { position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, #05070B 100%); }
</style>
</head>
<body>
<div id="stage">
  <svg id="svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
    <defs>
      <filter id="blurA" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur id="blurA-g" stdDeviation="26"/>
      </filter>
      <filter id="blurB" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur id="blurB-g" stdDeviation="26"/>
      </filter>
      <linearGradient id="gradA" gradientUnits="userSpaceOnUse"></linearGradient>
      <linearGradient id="gradB" gradientUnits="userSpaceOnUse"></linearGradient>
      <radialGradient id="gradAr" gradientUnits="userSpaceOnUse"></radialGradient>
      <radialGradient id="gradBr" gradientUnits="userSpaceOnUse"></radialGradient>
    </defs>
    <g id="scene" style="mix-blend-mode: screen;">
      <path id="pathA" filter="url(#blurA)"/>
      <path id="pathB" filter="url(#blurB)"/>
    </g>
  </svg>
</div>
<div class="vignette"></div>
<div class="hud">SVG MORPH · <b id="lbl">—</b></div>
<div class="ctrl">
  <button id="pp">Pause</button>
  <button id="nx">Next ›</button>
</div>

<script src="morphing_config.js"></script>
<script>
const CFG = window.MORPH_CONFIG;
const N = 128;                       // 모든 형태를 동일한 경계점 수로 리샘플 → 점대점 몰핑
const TAU = Math.PI * 2;

// ---------- 각 형태를 N개의 경계점(정규화 0..1)으로 변환 ----------
function centroid(pts){ let x=0,y=0; for(const p of pts){x+=p[0];y+=p[1];} return [x/pts.length, y/pts.length]; }

// Catmull-Rom 으로 닫힌 곡선을 매끄럽게 보간 후 N점 균일 샘플
function sampleClosed(ctrl, N){
  const m = ctrl.length, dense = [];
  const steps = 24;
  for(let i=0;i<m;i++){
    const p0=ctrl[(i-1+m)%m], p1=ctrl[i], p2=ctrl[(i+1)%m], p3=ctrl[(i+2)%m];
    for(let s=0;s<steps;s++){
      const t=s/steps, t2=t*t, t3=t2*t;
      const x=0.5*((2*p1[0])+(-p0[0]+p2[0])*t+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3);
      const y=0.5*((2*p1[1])+(-p0[1]+p2[1])*t+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3);
      dense.push([x,y]);
    }
  }
  return resampleByArcLength(dense, N);
}

function resampleByArcLength(poly, N){
  const acc=[0]; let total=0;
  for(let i=1;i<poly.length;i++){ total+=Math.hypot(poly[i][0]-poly[i-1][0], poly[i][1]-poly[i-1][1]); acc.push(total); }
  const out=[];
  for(let i=0;i<N;i++){
    const d=(i/N)*total; let k=1; while(k<acc.length && acc[k]<d) k++;
    const a=acc[k-1], b=acc[k]||total, t=(b-a)?(d-a)/(b-a):0;
    const p0=poly[k-1], p1=poly[k%poly.length];
    out.push([p0[0]+(p1[0]-p0[0])*t, p0[1]+(p1[1]-p0[1])*t]);
  }
  return out;
}

// 별: 각도별 반지름 함수 (4갈래 스파이크)
function sampleStar(star, N){
  const c=[0.5,0.5], out=[];
  for(let i=0;i<N;i++){
    const a=(i/N)*TAU;
    const k=Math.abs(Math.cos(2*a));                 // 4-fold
    const spike=Math.pow(k, 1+star.spikeSharpness*8);
    const r=star.innerRadius+(star.outerRadius-star.innerRadius)*spike;
    out.push([c[0]+Math.cos(a)*r, c[1]+Math.sin(a)*r]);
  }
  return out;
}

// metaball 군집: 무게중심에서 각도별로 가장 멀리 닿는 원 경계를 취함
function sampleMetaballs(balls, N){
  let cx=0,cy=0; for(const b of balls){cx+=b.center[0];cy+=b.center[1];} cx/=balls.length; cy/=balls.length;
  const out=[];
  for(let i=0;i<N;i++){
    const a=(i/N)*TAU, dx=Math.cos(a), dy=Math.sin(a); let rmax=0;
    for(const b of balls){
      const ox=b.center[0]-cx, oy=b.center[1]-cy;
      const proj=ox*dx+oy*dy;
      const perp2=(ox*ox+oy*oy)-proj*proj;
      if(perp2<=b.radius*b.radius){
        const reach=proj+Math.sqrt(b.radius*b.radius-perp2);
        if(reach>rmax) rmax=reach;
      }
    }
    rmax*=1.12; // 필드 부풀림
    out.push([cx+dx*rmax, cy+dy*rmax]);
  }
  return out;
}

function shapeToPoints(shape){
  const f=shape.form;
  let pts;
  if(f.star) pts=sampleStar(f.star, N);
  else if(f.metaballs) pts=sampleMetaballs(f.metaballs, N);
  else pts=sampleClosed(f.blob.controlPoints, N);
  // 위상 정렬: 무게중심 기준 각도순으로 재배열해야 몰핑 시 꼬임 방지
  const c=centroid(pts);
  pts=pts.map(p=>({p, a:Math.atan2(p[1]-c[1], p[0]-c[0])}));
  pts.sort((u,v)=>u.a-v.a);
  return pts.map(o=>o.p);
}

// ---------- 형태/노이즈 데이터 준비 ----------
const SHAPES = CFG.shapes.map(s => ({ cfg:s, pts:shapeToPoints(s) }));
const ORDER = CFG.morphSequence.order.map(id => SHAPES.findIndex(s=>s.cfg.id===id));
const noiseSeed = Array.from({length:N}, (_,i)=>[Math.sin(i*12.9898)*43758.5453%1, Math.cos(i*78.233)*12543.21%1]);

// ---------- 패스 빌더 (Catmull-Rom → cubic bezier, 닫힌 곡선) ----------
function buildPath(pts, t){
  const m=pts.length, P=[];
  for(let i=0;i<m;i++){
    // 유기적 노이즈로 정점 흔들기
    const n=CFG.globalMotion.organicNoise;
    const ph=t*0.001*n.speed*TAU;
    const nx=Math.sin(ph + noiseSeed[i][0]*TAU)*n.amplitude*0.25;
    const ny=Math.cos(ph*1.3 + noiseSeed[i][1]*TAU)*n.amplitude*0.25;
    P.push([ (pts[i][0]+nx)*1000, (pts[i][1]+ny)*1000 ]);
  }
  let d=`M ${P[0][0].toFixed(2)} ${P[0][1].toFixed(2)} `;
  for(let i=0;i<m;i++){
    const p0=P[(i-1+m)%m], p1=P[i], p2=P[(i+1)%m], p3=P[(i+2)%m];
    const c1=[p1[0]+(p2[0]-p0[0])/6, p1[1]+(p2[1]-p0[1])/6];
    const c2=[p2[0]-(p3[0]-p1[0])/6, p2[1]-(p3[1]-p1[1])/6];
    d+=`C ${c1[0].toFixed(2)} ${c1[1].toFixed(2)} ${c2[0].toFixed(2)} ${c2[1].toFixed(2)} ${p2[0].toFixed(2)} ${p2[1].toFixed(2)} `;
  }
  return d+'Z';
}

function lerpPts(a,b,t){ return a.map((p,i)=>[p[0]+(b[i][0]-p[0])*t, p[1]+(b[i][1]-p[1])*t]); }
const ease = u => { const e=CFG.globalMotion.easing; return cubicBezierEase(u); };
function cubicBezierEase(u){ // approx cubic-bezier(0.65,0,0.35,1)
  return u<0.5 ? 4*u*u*u : 1-Math.pow(-2*u+2,3)/2;
}

// ---------- 그라디언트 적용 ----------
function applyGradient(linId, radId, useRad, color, target){
  const stopsHTML = color.stops.map(s=>`<stop offset="${s.offset}" stop-color="${s.color}"/>`).join('');
  if(useRad){
    const g=document.getElementById(radId);
    g.innerHTML=stopsHTML;
    const c=color.center||[0.5,0.5];
    g.setAttribute('cx', c[0]*1000); g.setAttribute('cy', c[1]*1000);
    g.setAttribute('r', 620); g.setAttribute('fx', c[0]*1000); g.setAttribute('fy', c[1]*1000);
    target.setAttribute('fill', `url(#${radId})`);
  } else {
    const g=document.getElementById(linId);
    g.innerHTML=stopsHTML;
    const a=(color.angle||0)*Math.PI/180;
    const cx=500, cy=500, R=520;
    g.setAttribute('x1', cx-Math.cos(a)*R); g.setAttribute('y1', cy-Math.sin(a)*R);
    g.setAttribute('x2', cx+Math.cos(a)*R); g.setAttribute('y2', cy+Math.sin(a)*R);
    target.setAttribute('fill', `url(#${linId})`);
  }
}

// ---------- 애니메이션 루프 ----------
const pathA=document.getElementById('pathA'), pathB=document.getElementById('pathB');
const blurAg=document.getElementById('blurA-g'), blurBg=document.getElementById('blurB-g');
const lbl=document.getElementById('lbl');
let seqIdx=0, t0=performance.now(), playing=true, manualNext=false;

function leg(i){ return ORDER[i % ORDER.length]; }
function transOf(i){ const t=CFG.morphSequence.transitions; return t[i % t.length]; }

function frame(now){
  const tr = transOf(seqIdx);
  const dur = tr.durationMs, hold = CFG.globalMotion.holdDurationMs;
  let elapsed = now - t0;
  const total = dur + hold;
  if(manualNext){ elapsed = total; manualNext=false; }

  let u = Math.min(elapsed/dur, 1);        // 0..1 몰핑 진행
  const te = ease(u);

  const A = SHAPES[leg(seqIdx)], B = SHAPES[leg(seqIdx+1)];
  const geom = lerpPts(A.pts, B.pts, te);
  const d = buildPath(geom, now);
  pathA.setAttribute('d', d);
  pathB.setAttribute('d', d);

  // 컬러 크로스페이드: A(1-te) 위에 B(te)
  const ca=A.cfg.color, cb=B.cfg.color;
  applyGradient('gradA','gradAr', ca.type==='radial-gradient', ca, pathA);
  applyGradient('gradB','gradBr', cb.type==='radial-gradient', cb, pathB);
  pathA.setAttribute('opacity', (A.cfg.opacity*(1-te)).toFixed(3));
  pathB.setAttribute('opacity', (B.cfg.opacity*te).toFixed(3));

  // 블러 보간
  blurAg.setAttribute('stdDeviation', (A.cfg.blur+(B.cfg.blur-A.cfg.blur)*te).toFixed(1));
  blurBg.setAttribute('stdDeviation', (A.cfg.blur+(B.cfg.blur-A.cfg.blur)*te).toFixed(1));

  // breathing (전체 scene 회전/스케일)
  const bm=CFG.globalMotion.breathing;
  const bt=(now/bm.periodMs)*TAU;
  const sc=1+(bm.scaleRange[1]-bm.scaleRange[0])*0.5*Math.sin(bt);
  const rot=bm.rotationRange[1]*Math.sin(bt*0.7);
  document.getElementById('scene').setAttribute('transform', `translate(500,500) scale(${sc.toFixed(3)}) rotate(${rot.toFixed(2)}) translate(-500,-500)`);

  lbl.textContent = `${A.cfg.label}  →  ${B.cfg.label}`;

  if(elapsed>=total){ seqIdx=(seqIdx+1)%ORDER.length; t0=now; }
  if(playing || manualNext) requestAnimationFrame(frame); else pendingRAF=requestAnimationFrame(frame);
}

let pendingRAF=requestAnimationFrame(frame);
document.getElementById('pp').onclick=function(){
  playing=!playing; this.textContent=playing?'Pause':'Play';
  if(playing){ t0=performance.now()-0; requestAnimationFrame(frame); }
};
document.getElementById('nx').onclick=()=>{ manualNext=true; if(!playing) requestAnimationFrame(frame); };
</script>
</body>
</html>
