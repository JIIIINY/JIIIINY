<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circle Blend Motion · 360×800</title>
<style>
  :root{
    --panel-bg: rgba(20,20,24,0.72);
    --panel-br: rgba(255,255,255,0.10);
    --txt: rgba(255,255,255,0.86);
    --txt-dim: rgba(255,255,255,0.45);
    --accent: #ffb86c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;width:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0d0d11}

  /* page backdrop */
  #wrap{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 120% at 50% 0%, #1b1b22 0%, #0a0a0d 70%);
  }

  /* the 360x800 key-screen device */
  #device{
    position:relative;
    width:360px;height:800px;
    border-radius:40px;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.05);
    background:#ffffff;
    transition:background .4s ease;
  }
  #device.dark{background:#0a0a0c}
  #device.checker{
    background-color:#cfcfcf;
    background-image:
      linear-gradient(45deg,#9a9a9a 25%,transparent 25%),
      linear-gradient(-45deg,#9a9a9a 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#9a9a9a 75%),
      linear-gradient(-45deg,transparent 75%,#9a9a9a 75%);
    background-size:28px 28px;
    background-position:0 0,0 14px,14px -14px,-14px 0;
  }
  #gl{position:absolute;inset:0;width:100%;height:100%;display:block}

  /* control panel */
  #panel{
    position:fixed;left:18px;bottom:18px;z-index:10;
    width:252px;padding:14px 14px 12px;
    background:var(--panel-bg);
    border:1px solid var(--panel-br);
    border-radius:16px;
    backdrop-filter:blur(18px) saturate(1.2);
    -webkit-backdrop-filter:blur(18px) saturate(1.2);
    color:var(--txt);
    box-shadow:0 8px 40px rgba(0,0,0,.28);
    user-select:none;
    transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;
  }
  #panel.collapsed{transform:translateY(calc(100% - 42px));opacity:.92}
  .head{display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:10px}
  .head h1{font-size:12px;font-weight:600;letter-spacing:.04em;color:var(--txt)}
  .head .dot{font-size:11px;color:var(--txt-dim)}

  .row{margin:11px 0}
  .row label{display:flex;justify-content:space-between;font-size:11px;color:var(--txt-dim);margin-bottom:6px;letter-spacing:.02em}
  .row label b{color:var(--accent);font-weight:600}
  input[type=range]{
    -webkit-appearance:none;appearance:none;width:100%;height:3px;border-radius:3px;
    background:rgba(255,255,255,.16);outline:none;cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;
    background:linear-gradient(135deg,#ffd2a0,#ff7eb6,#9b8bff);
    box-shadow:0 1px 6px rgba(0,0,0,.35);
  }
  input[type=range]::-moz-range-thumb{width:14px;height:14px;border:none;border-radius:50%;
    background:linear-gradient(135deg,#ffd2a0,#ff7eb6,#9b8bff)}

  .seclabel{font-size:10px;color:var(--txt-dim);letter-spacing:.08em;text-transform:uppercase;margin:13px 0 7px}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chips button{flex:1 1 0;min-width:0}
  .btns{display:flex;gap:7px;margin-top:13px}
  button{
    flex:1;padding:8px 0;font-size:11px;font-weight:600;letter-spacing:.02em;
    color:var(--txt);background:rgba(255,255,255,.07);
    border:1px solid var(--panel-br);border-radius:10px;cursor:pointer;
    transition:background .2s,border-color .2s;
  }
  button:hover{background:rgba(255,255,255,.13)}
  button.active{border-color:var(--accent);color:#fff}
  button.rec{color:#ff8da3}
  button.rec.on{background:rgba(255,80,110,.18);border-color:#ff5a6e;color:#ffd0d8}

  .bgrow{display:flex;gap:6px;margin-top:9px}
  .bgrow button{padding:7px 0}
  .hint{font-size:10px;color:var(--txt-dim);margin-top:10px;line-height:1.5}
</style>
</head>
<body>
  <div id="wrap">
    <div id="device" class="dark">
      <canvas id="gl"></canvas>
    </div>
  </div>

  <div id="panel">
    <div class="head" id="head">
      <h1>CIRCLE BLEND · 360×800 · R=92</h1>
      <span class="dot" id="chev">▾</span>
    </div>

    <div class="row">
      <label>합쳐짐 속도 <b id="vSpeed">0.55</b></label>
      <input type="range" id="speed" min="0" max="2" step="0.01" value="0.55">
    </div>
    <div class="row">
      <label>최대 겹침 <b id="vMerge">0.80</b></label>
      <input type="range" id="merge" min="0.2" max="1" step="0.01" value="0.80">
    </div>
    <div class="row">
      <label>가장자리 부드러움 <b id="vSoft">1.0</b></label>
      <input type="range" id="soft" min="0.2" max="3" step="0.01" value="1.0">
    </div>
    <div class="row">
      <label>입자(그레인) <b id="vGrain">0.5</b></label>
      <input type="range" id="grain" min="0" max="1.5" step="0.01" value="0.5">
    </div>

    <div class="seclabel">컬러 테마</div>
    <div class="chips" id="themes">
      <button data-theme="0" class="active">선셋</button>
      <button data-theme="1">바이올렛</button>
      <button data-theme="2">스프링</button>
      <button data-theme="3">크림</button>
    </div>

    <div class="btns">
      <button id="play" class="active">⏸ 정지</button>
      <button id="rec" class="rec">● 녹화</button>
    </div>

    <div class="bgrow">
      <button data-bg="" >흰색</button>
      <button data-bg="dark" class="active">검정</button>
      <button data-bg="checker">체커</button>
    </div>

    <div class="hint">360×800 키스크린 중앙에 R=92dp 두 원이 합쳐지며 컬러가 블렌딩되고, 다시 제자리로 돌아가며 원래 컬러를 유지합니다. ‘녹화’는 알파 포함 .webm으로 저장됩니다.</div>
  </div>

<script>
const cv = document.getElementById('gl');
const gl = cv.getContext('webgl', {alpha:true, premultipliedAlpha:false, antialias:true, preserveDrawingBuffer:true});
if(!gl){ alert('이 브라우저는 WebGL을 지원하지 않습니다.'); }

const VERT = `
attribute vec2 a;
void main(){ gl_Position = vec4(a,0.0,1.0); }`;

const FRAG = `
precision highp float;
uniform vec2  u_res;       // canvas pixel size
uniform float u_time;
uniform float u_merge;     // max overlap amount 0..1
uniform float u_soft;      // edge softness multiplier
uniform float u_grain;     // film grain strength
// two circles, each with a top & bottom gradient color
uniform vec3  u_a_top;
uniform vec3  u_a_bot;
uniform vec3  u_b_top;
uniform vec3  u_b_bot;

const float LOGW = 360.0;
const float LOGH = 800.0;
const float R    = 92.0;   // R = 92dp

float hash(vec2 p){ p=fract(p*vec2(123.34,345.45)); p+=dot(p,p+34.345); return fract(p.x*p.y); }

void main(){
  // map fragment to logical 360x800 space (origin top-left)
  vec2 P = vec2(gl_FragCoord.x, u_res.y - gl_FragCoord.y) * (LOGW / u_res.x);

  // ---- merge timeline: 0 = rest(separated) -> 1 = merged ----
  float phase = u_time;                       // already scaled by speed on CPU
  float m = 0.5 - 0.5*cos(phase);             // smooth breathe 0->1->0
  m = m*m*(3.0-2.0*m);                         // ease

  // vertical separation of the two centers (half-distance)
  float restSep  = 118.0;                      // pure, separated colors
  float mergeSep = mix(118.0, 44.0, u_merge);  // deepest overlap
  float sep = mix(restSep, mergeSep, m);

  vec2 cA = vec2(LOGW*0.5, LOGH*0.5 - sep);    // top circle
  vec2 cB = vec2(LOGW*0.5, LOGH*0.5 + sep);    // bottom circle

  // ---- metaball field for organic merging bridge ----
  float dA2 = dot(P-cA, P-cA);
  float dB2 = dot(P-cB, P-cB);
  float fA = (R*R) / (dA2 + 1.0);
  float fB = (R*R) / (dB2 + 1.0);
  float f  = fA + fB;

  // soft surface around field == 1.0
  float e = 0.16 * u_soft;
  float shape = smoothstep(1.0 - e, 1.0 + e, f);

  // ---- per-circle vertical gradient colors ----
  float tA = clamp((P.y - (cA.y - R)) / (2.0*R), 0.0, 1.0);
  float tB = clamp((P.y - (cB.y - R)) / (2.0*R), 0.0, 1.0);
  vec3 colA = mix(u_a_top, u_a_bot, tA);
  vec3 colB = mix(u_b_top, u_b_bot, tB);

  // blend weight from relative field strength -> smooth gradient in the bridge,
  // pure color near each center, full blend where they meet.
  float w = fB / (fA + fB + 1e-4);
  vec3 rgb = mix(colA, colB, w);

  // film grain like the reference frames
  float g = (hash(gl_FragCoord.xy + u_time*60.0) - 0.5) * 0.06 * u_grain;
  rgb += g;

  float alpha = shape;
  gl_FragColor = vec4(rgb, clamp(alpha, 0.0, 1.0));
}`;

function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FRAG));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
const loc = gl.getAttribLocation(prog,'a');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

const U = {
  res:   gl.getUniformLocation(prog,'u_res'),
  time:  gl.getUniformLocation(prog,'u_time'),
  merge: gl.getUniformLocation(prog,'u_merge'),
  soft:  gl.getUniformLocation(prog,'u_soft'),
  grain: gl.getUniformLocation(prog,'u_grain'),
  aTop:  gl.getUniformLocation(prog,'u_a_top'),
  aBot:  gl.getUniformLocation(prog,'u_a_bot'),
  bTop:  gl.getUniformLocation(prog,'u_b_top'),
  bBot:  gl.getUniformLocation(prog,'u_b_bot'),
};

// ---- color themes derived from the reference images ----
const hex = h => [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255];
const THEMES = [
  // 0 선셋 : 따뜻한(주황→핑크) + 차가운(바이올렛→블루)
  { aTop:'#ffb23e', aBot:'#ff5fa2', bTop:'#7b2ff7', bBot:'#3e78e0' },
  // 1 바이올렛 : 바이올렛 + 라임그린 (IMG_9992)
  { aTop:'#7b2ff7', aBot:'#9b5cff', bTop:'#c6f25a', bBot:'#6fd0c0' },
  // 2 스프링 : 라임 + 핑크/마젠타
  { aTop:'#c6f25a', aBot:'#a6e84e', bTop:'#ff7eb6', bBot:'#ff8a2b' },
  // 3 크림 : 크림화이트 + 주황 (IMG_9996 / 9994)
  { aTop:'#f6efe0', aBot:'#bcecee', bTop:'#ffb23e', bBot:'#ff8a2b' },
];
let theme = THEMES[0];

let DPR = Math.min(window.devicePixelRatio||1, 2);
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  cv.width  = Math.floor(360*DPR);
  cv.height = Math.floor(800*DPR);
  gl.viewport(0,0,cv.width,cv.height);
}
window.addEventListener('resize', resize); resize();

// state
const state = { speed:0.55, merge:0.80, soft:1.0, grain:0.5, playing:true };
let simTime = 0, last = performance.now();

function frame(now){
  const dt = Math.min((now-last)/1000, 0.05); last = now;
  if(state.playing) simTime += dt*state.speed;
  gl.uniform2f(U.res, cv.width, cv.height);
  gl.uniform1f(U.time, simTime);
  gl.uniform1f(U.merge, state.merge);
  gl.uniform1f(U.soft, state.soft);
  gl.uniform1f(U.grain, state.grain);
  gl.uniform3fv(U.aTop, hex(theme.aTop));
  gl.uniform3fv(U.aBot, hex(theme.aBot));
  gl.uniform3fv(U.bTop, hex(theme.bTop));
  gl.uniform3fv(U.bBot, hex(theme.bBot));
  gl.clearColor(0,0,0,0);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ---- UI ----
const $ = id => document.getElementById(id);
function bind(id, key, label, fmt){
  const el = $(id), out = $(label);
  el.addEventListener('input', ()=>{ state[key]=parseFloat(el.value); out.textContent=fmt(state[key]); });
}
bind('speed','speed','vSpeed', v=>v.toFixed(2));
bind('merge','merge','vMerge', v=>v.toFixed(2));
bind('soft','soft','vSoft', v=>v.toFixed(2));
bind('grain','grain','vGrain', v=>v.toFixed(2));

const playBtn = $('play');
playBtn.addEventListener('click', ()=>{
  state.playing = !state.playing;
  playBtn.textContent = state.playing ? '⏸ 정지' : '▶ 재생';
  playBtn.classList.toggle('active', state.playing);
});

// theme buttons
document.querySelectorAll('#themes button').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('#themes button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    theme = THEMES[parseInt(b.dataset.theme)];
  });
});

// background toggle
const device = $('device');
document.querySelectorAll('.bgrow button').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('.bgrow button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    device.className = b.dataset.bg;
  });
});

// collapse panel
const panel = $('panel'), chev = $('chev');
$('head').addEventListener('click', ()=>{
  panel.classList.toggle('collapsed');
  chev.textContent = panel.classList.contains('collapsed') ? '▴' : '▾';
});

// ---- recording (alpha webm) ----
let recorder=null, chunks=[];
const recBtn = $('rec');
recBtn.addEventListener('click', ()=>{
  if(recorder && recorder.state==='recording'){ recorder.stop(); return; }
  const stream = cv.captureStream(60);
  const types = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
  const mime = types.find(t=>MediaRecorder.isTypeSupported(t)) || '';
  try{
    recorder = new MediaRecorder(stream, mime?{mimeType:mime, videoBitsPerSecond:12_000_000}:undefined);
  }catch(e){ alert('이 브라우저에서 녹화를 지원하지 않습니다.'); return; }
  chunks=[];
  recorder.ondataavailable = e=>{ if(e.data.size) chunks.push(e.data); };
  recorder.onstop = ()=>{
    const blob = new Blob(chunks, {type:'video/webm'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download='circle-blend-motion.webm'; a.click();
    URL.revokeObjectURL(url);
    recBtn.classList.remove('on'); recBtn.textContent='● 녹화';
  };
  recorder.start();
  recBtn.classList.add('on'); recBtn.textContent='■ 정지';
});
</script>
</body>
</html>
