<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Iridescent Halo Orb — Ambient Light</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%;
    background: #0d0d0f; color: #e8e8ea;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    overflow: hidden;
  }
  .stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; transition: padding-right .25s ease; }
  body.panel-open .stage { padding-right: 300px; }
  @media (max-width: 760px){ body.panel-open .stage { padding-right: 0; } }

  .canvas-wrap { position: relative; width: 360px; height: 760px; max-height: 92vh; aspect-ratio: 360/760; border-radius: 26px; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,.55); }
  canvas#orb { display:block; width:100%; height:100%; border-radius:26px; }
  .rec-dot { position:absolute; top:12px; left:12px; display:none; align-items:center; gap:6px; font-size:12px; color:#fff; background:rgba(0,0,0,.4); padding:4px 10px; border-radius:999px; }
  .rec-dot.on{ display:flex; }
  .rec-dot .blink{ width:9px;height:9px;border-radius:50%;background:#ff3b30;animation:blink 1s steps(2,start) infinite; }
  @keyframes blink{ 50%{opacity:.15;} }

  .panel { position: fixed; top:0; right:0; height:100%; width:300px; background:#141417; border-left:1px solid #26262b; transform: translateX(100%); transition: transform .25s ease; overflow-y:auto; padding:16px 16px 40px; z-index:20; }
  body.panel-open .panel{ transform: translateX(0); }
  .panel h1{ font-size:15px; margin:2px 0 2px; }
  .panel .sub{ font-size:11px; color:#8a8a92; margin:0 0 14px; }
  .sec-title{ font-size:11px; letter-spacing:.4px; text-transform:uppercase; color:#7b7b85; margin:16px 0 8px; }
  .row{ margin-bottom:12px; }
  .row label{ display:flex; justify-content:space-between; align-items:baseline; font-size:12px; color:#b9b9c0; margin-bottom:5px; }
  .row label .val{ font-variant-numeric:tabular-nums; color:#f0c45a; font-size:11px; }
  input[type=range]{ width:100%; -webkit-appearance:none; appearance:none; height:4px; border-radius:4px; background:#2c2c33; outline:none; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:16px;height:16px;border-radius:50%;background:#f0c45a;border:2px solid #141417;cursor:pointer; }
  input[type=range]::-moz-range-thumb{ width:16px;height:16px;border-radius:50%;background:#f0c45a;border:2px solid #141417;cursor:pointer; }
  .btns{ display:flex; gap:8px; flex-wrap:wrap; margin:10px 0 4px; }
  button{ flex:1 1 auto; background:#232329; color:#e8e8ea; border:1px solid #34343c; border-radius:10px; padding:10px 8px; font-size:12px; cursor:pointer; }
  button:active{ background:#2c2c34; }
  button.on{ background:#f0c45a; color:#1a1206; border-color:#f0c45a; font-weight:600; }
  button.primary{ background:#f0c45a; color:#1a1206; border-color:#f0c45a; font-weight:600; }
  button.rnd{ background:#6c5cf0; color:#fff; border-color:#6c5cf0; font-weight:600; }
  button.pal{ background:#1f6f5c; color:#dffff2; border-color:#2a8f76; }
  button.rec.active{ background:#ff3b30; color:#fff; border-color:#ff3b30; }
  .pal-name{ font-size:11px; color:#7bd0b0; margin:4px 0 0; text-align:center; }
  .scrub-row{ display:flex; align-items:center; gap:8px; margin-top:8px; }
  .scrub-row input[type=checkbox]{ accent-color:#f0c45a; }
  .scrub-row .lp{ font-size:11px; color:#b9b9c0; white-space:nowrap; }
  #toggle{ position:fixed; top:14px; right:14px; z-index:30; width:44px; height:44px; border-radius:50%; background:rgba(30,30,36,.85); border:1px solid #34343c; color:#e8e8ea; font-size:18px; backdrop-filter:blur(6px); }
  body.panel-open #toggle{ right:314px; }
  @media (max-width: 760px){ body.panel-open #toggle{ right:14px; } }
</style>
</head>
<body class="panel-open">
  <div class="stage">
    <div class="canvas-wrap">
      <canvas id="orb" width="720" height="1520"></canvas>
      <div class="rec-dot" id="recDot"><span class="blink"></span> REC</div>
    </div>
  </div>

  <button id="toggle">⚙</button>

  <div class="panel">
    <h1>Iridescent Halo Orb</h1>
    <p class="sub">앰비언트 라이트 · 도형 변형/회전 · 외곽 왜곡 · WebGL</p>

    <div class="btns">
      <button id="playBtn" class="primary">⏸ 일시정지</button>
      <button id="recBtn" class="rec">● 녹화</button>
    </div>
    <div class="btns">
      <button id="rndBtn" class="rnd">🎲 랜덤</button>
      <button id="palBtn" class="pal">🎨 팔레트</button>
      <button id="resetBtn">↺ 초기화</button>
    </div>
    <p class="pal-name" id="palName">팔레트: Iridescent</p>

    <div class="sec-title">중앙 도형</div>
    <div class="btns" id="shapeBtns">
      <button data-sides="0">○ 원</button>
      <button data-sides="3">△ 세모</button>
      <button data-sides="4">□ 네모</button>
    </div>

    <div id="sliders"></div>
  </div>

<script>
/* ========================= 파라미터 ========================= */
const PARAMS = {
  // 중앙 도형
  orbSize:      { def:0.30, min:0.12, max:0.46, step:0.005 },
  shapeSides:   { def:0,    min:0,    max:6,    step:1 },     // 0=원, 3=세모, 4=네모...
  shapeRound:   { def:0.10, min:0,    max:1,    step:0.02 },  // 모서리 둥글기
  shapeRot:     { def:24,   min:0,    max:180,  step:1 },     // 도형 360° 회전 속도(°/s)
  // 외곽 왜곡
  distortAmt:   { def:0.00, min:0,    max:0.45, step:0.01 },  // 왜곡 세기
  distortFreq:  { def:5,    min:1,    max:12,   step:1 },     // 왜곡 빈도
  // 엣지/블러
  edgeAC:       { def:15,   min:0,    max:360,  step:1 },
  edgeAW:       { def:45,   min:8,    max:120,  step:1 },
  edgeBC:       { def:210,  min:0,    max:360,  step:1 },
  edgeBW:       { def:60,   min:8,    max:120,  step:1 },
  edgeContrast: { def:0.88, min:0,    max:1,    step:0.01 },
  blurAmt:      { def:0.12, min:0.02, max:0.26, step:0.005 },
  // 라이팅(앰비언트)
  lightSize:    { def:0.30, min:0.05, max:0.85, step:0.005 }, // 빛 레이어 크기(도형과 별도)
  lightAmt:     { def:0.55, min:0,    max:1.6,  step:0.01 },  // 빛 세기
  lightUneven:  { def:0.65, min:0,    max:1,    step:0.02 },  // 불균등 정도
  // 컬러/할로
  hue:          { def:0,    min:-180, max:180,  step:1 },
  haloMix:      { def:0.72, min:0,    max:1,    step:0.02 },
  intensity:    { def:1.0,  min:0,    max:2,    step:0.01 },
  exposure:     { def:0.96, min:0.4,  max:1.4,  step:0.01 },
  haloOuter:    { def:0.66, min:0.40, max:0.95, step:0.01 },
  falloff:      { def:1.8,  min:0.5,  max:4,    step:0.05 },
  // 모션
  rot:          { def:12,   min:0,    max:60,   step:1 },     // 할로 색 흐름 회전
  breath:       { def:0.05, min:0,    max:0.20, step:0.005 },
};
const LABELS = {
  orbSize:'도형 크기', shapeSides:'형태(0원/3세모/4네모)', shapeRound:'모서리 둥글기', shapeRot:'도형 회전(°/s)',
  distortAmt:'외곽 왜곡 세기', distortFreq:'왜곡 빈도',
  edgeAC:'엣지A 위치(°)', edgeAW:'엣지A 폭(±°)', edgeBC:'엣지B 위치(°)', edgeBW:'엣지B 폭(±°)', edgeContrast:'엣지 대비', blurAmt:'블러 세기',
  lightSize:'빛 레이어 크기', lightAmt:'빛 세기', lightUneven:'빛 불균등',
  hue:'색조(hue °)', haloMix:'색 선명도', intensity:'할로 강도', exposure:'밝기', haloOuter:'할로 크기', falloff:'할로 폴오프',
  rot:'할로 회전(°/s)', breath:'호흡'
};
const SECTIONS = [
  { title:'중앙 도형', keys:['orbSize','shapeSides','shapeRound','shapeRot'] },
  { title:'외곽 왜곡', keys:['distortAmt','distortFreq'] },
  { title:'엣지 / 블러 위치', keys:['edgeAC','edgeAW','edgeBC','edgeBW','edgeContrast','blurAmt'] },
  { title:'라이팅 (앰비언트)', keys:['lightSize','lightAmt','lightUneven'] },
  { title:'컬러 / 할로', keys:['hue','haloMix','intensity','exposure','haloOuter','falloff'] },
  { title:'모션', keys:['rot','breath'] },
];

const PALETTES = [
  { name:'Iridescent', stops:['#F2B244','#EDD960','#EDD960','#DEE09F','#E2B98B','#DAC9B5','#D8BEC9','#E4A2BE','#E85BA0','#E99267','#E07237','#E47B39'] },
  { name:'Sunset',     stops:['#FFC24B','#FF9A56','#FF6F61','#FF5C8A','#E85BA0','#C45BD0','#F06C8A','#FFB347','#FF8C69','#FF5E78','#D45BC0','#FF7E5F'] },
  { name:'Aurora',     stops:['#7CF5C2','#5CE0E8','#5AB0F0','#7E8CF0','#A86CF0','#D06CE0','#6CE0B0','#9CF0A0','#C8F08C','#7CE0D0','#5CC8E8','#8C9CF0'] },
  { name:'Ocean',      stops:['#5AD2F0','#56B8E8','#4F9AE0','#6C8CF0','#5CC8C0','#7CE0D8','#9CE8F0','#5AB0E8','#4F86D0','#6CA8F0','#5CD0D8','#8CD8F0'] },
  { name:'Neon',       stops:['#FF2D95','#FF6AD5','#C774E8','#AD8CFF','#8795E8','#94D0FF','#6AF0C0','#C2FF6A','#FFF36A','#FF9A6A','#FF5E5E','#FF2D6A'] },
];
let palIdx=0;

const state={}; Object.keys(PARAMS).forEach(k=>state[k]=PARAMS[k].def);
function hexToRGB(h){ h=h.replace('#',''); return [parseInt(h.slice(0,2),16)/255,parseInt(h.slice(2,4),16)/255,parseInt(h.slice(4,6),16)/255]; }
function lerp(a,b,t){ return a+(b-a)*t; }

/* ========================= WebGL ========================= */
const canvas=document.getElementById('orb');
const gl=canvas.getContext('webgl',{preserveDrawingBuffer:true,antialias:true});
if(!gl){ alert('이 브라우저는 WebGL을 지원하지 않습니다.'); }

const VERT=`attribute vec2 a_pos; void main(){ gl_Position=vec4(a_pos,0.0,1.0); }`;
const FRAG=`
precision highp float;
uniform vec2  u_res;
uniform vec2  u_center;
uniform float u_radius;
uniform float u_shapeSides;
uniform float u_shapeRound;
uniform float u_shapeAngle;   // rad
uniform float u_distortAmt;
uniform float u_distortFreq;
uniform vec2  u_edgeA;
uniform vec2  u_edgeB;
uniform float u_sharpFeather;
uniform float u_blurFeather;
uniform float u_lightSize;
uniform float u_lightAmt;
uniform float u_lightUneven;
uniform float u_glowSpread;
uniform float u_haloInner;
uniform float u_haloOuter;
uniform float u_falloff;
uniform float u_intensity;
uniform float u_angle;        // halo rot deg
uniform float u_hue;
uniform float u_exposure;
uniform float u_haloMix;
uniform float u_t;            // seconds
uniform vec3  u_bg;
uniform vec3  u_stops[12];

const float PI=3.14159265359;
float adist(float a,float b){ float d=abs(mod(a-b,360.0)); return min(d,360.0-d); }

vec3 haloColor(float deg){
  float a=mod(deg,360.0)/30.0; vec3 col=u_stops[0];
  for(int i=0;i<12;i++){ float lo=float(i);
    if(a>=lo && a<lo+1.0){ vec3 c0=u_stops[i]; vec3 c1=(i==11)?u_stops[0]:u_stops[i+1]; col=mix(c0,c1,a-lo); } }
  return col;
}
vec3 hueShift(vec3 c,float deg){
  float a=radians(deg),ca=cos(a),sa=sin(a);
  float Y=dot(c,vec3(0.299,0.587,0.114));
  float I=dot(c,vec3(0.596,-0.274,-0.322));
  float Q=dot(c,vec3(0.211,-0.523,0.312));
  float I2=I*ca-Q*sa, Q2=I*sa+Q*ca;
  return vec3(Y+0.956*I2+0.621*Q2, Y-0.272*I2-0.647*Q2, Y-1.106*I2+1.703*Q2);
}
// 중앙 도형 경계 반경(픽셀) — th(rad) 방향
float shapeBoundary(float th, float R){
  float br;
  if(u_shapeSides < 2.5){ br=R; }
  else {
    float ang=2.0*PI/u_shapeSides;
    float tt=mod(th - u_shapeAngle, ang) - ang*0.5;
    br=R*cos(PI/u_shapeSides)/cos(tt);
    br=mix(br, R, u_shapeRound);
  }
  // 외곽 왜곡(불규칙)
  float dphi=u_distortAmt*(0.62*sin(u_distortFreq*th + u_t*0.8) + 0.38*sin(2.0*u_distortFreq*th*0.7 - u_t*0.6 + 1.7));
  return br*(1.0+dphi);
}

void main(){
  vec2 p=vec2(gl_FragCoord.x, u_res.y-gl_FragCoord.y);
  vec2 c=u_center*u_res;
  vec2 d=p-c;
  float r=length(d);
  float W=u_res.x;

  float R       = u_radius*W;
  float innerPx = u_haloInner*W;
  float outerPx = u_haloOuter*W;
  float spreadPx= u_glowSpread*W;

  float angBase = mod(degrees(atan(-d.y,d.x)),360.0);  // 0=3시, 위=12시=90°
  float th      = atan(d.y,d.x);                        // 도형/빛용(rad)
  float rb      = shapeBoundary(th, R);                 // 도형 경계

  // 각도별 엣지/블러 feather
  const float SOFT=14.0;
  float eA=1.0-smoothstep(u_edgeA.y-SOFT,u_edgeA.y+SOFT,adist(angBase,u_edgeA.x));
  float eB=1.0-smoothstep(u_edgeB.y-SOFT,u_edgeB.y+SOFT,adist(angBase,u_edgeB.x));
  float edgeness=max(eA,eB);
  float featPx=mix(u_blurFeather*W, u_sharpFeather*W, edgeness);

  // 배경: 회색이 아니라 '빛'이 번지는 느낌 — 중앙 쪽이 살짝 밝은 그라디언트
  float bgGrad=1.0-smoothstep(0.0, 0.95*W, r);
  vec3 color=mix(u_bg*0.93, u_bg+vec3(0.03,0.03,0.025), bgGrad);

  vec3 hc=clamp(hueShift(haloColor(mod(angBase+u_angle,360.0)),u_hue),0.0,1.0);

  // ===== 앰비언트 라이트 레이어 (Ray 아님 / 불균등 / 은은) =====
  // 도형과 독립 크기(u_lightSize), 부드러운 가우시안 + 저주파 불균등 모듈레이션
  float lr=max(u_lightSize*W, 1.0);
  float lightFall=exp(-(r*r)/(2.0*lr*lr));
  float a1=0.5+0.5*sin(2.0*th + u_t*0.55);
  float a2=0.5+0.5*sin(3.0*th - u_t*0.42 + 1.3);
  float a3=0.5+0.5*sin(1.0*th + u_t*0.30 + 4.1);
  float uneven=mix(1.0, (0.5*a1+0.3*a2+0.2*a3), u_lightUneven);
  vec3 lightTint=mix(vec3(1.0,0.985,0.95), hc, 0.28);
  color += lightTint * lightFall * uneven * u_lightAmt;

  // ===== 할로 =====
  float t=clamp((r-innerPx)/max(outerPx-innerPx,1.0),0.0,1.0);
  float haloA=(r>outerPx)?0.0:pow(1.0-t,u_falloff);
  float a=clamp(haloA*u_intensity,0.0,1.0);
  vec3 overBlend=mix(color,hc,a);
  vec3 additive=color+hc*haloA*u_intensity*0.85;
  color=mix(additive,overBlend,u_haloMix);

  // ===== 도형 글로우 (블러 구간에서 더 번짐) =====
  float glowAmt=mix(0.4,1.0,1.0-edgeness)*(0.25+0.45*(0.5+0.5*sin(u_t*1.0)));
  float bloom=glowAmt*exp(-(r-rb)*(r-rb)/(2.0*spreadPx*spreadPx+1.0));
  color+=hc*bloom*0.30+vec3(1.0)*bloom*0.35;

  // ===== 엣지 대비: 선명 구간 바깥 얇은 다크 림 =====
  float rimW=max(featPx*1.5,2.0);
  float rim=exp(-(r-(rb+rimW))*(r-(rb+rimW))/(2.0*rimW*rimW))*step(rb,r);
  color*=1.0-0.28*rim*edgeness;

  // ===== 도형 본체(흰색) =====
  float orbA=1.0-smoothstep(rb-featPx, rb+featPx, r);
  color=mix(color,vec3(1.0),orbA);

  color*=u_exposure;
  gl_FragColor=vec4(clamp(color,0.0,1.0),1.0);
}
`;
function compile(t,s){ const sh=gl.createShader(t); gl.shaderSource(sh,s); gl.compileShader(sh);
  if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS)) console.error('SHADER',gl.getShaderInfoLog(sh)); return sh; }
const prog=gl.createProgram();
gl.attachShader(prog,compile(gl.VERTEX_SHADER,VERT));
gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,FRAG));
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog,gl.LINK_STATUS)) console.error('LINK',gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const vb=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,vb);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const aPos=gl.getAttribLocation(prog,'a_pos'); gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);

const U={};
['u_res','u_center','u_radius','u_shapeSides','u_shapeRound','u_shapeAngle','u_distortAmt','u_distortFreq',
 'u_edgeA','u_edgeB','u_sharpFeather','u_blurFeather','u_lightSize','u_lightAmt','u_lightUneven',
 'u_glowSpread','u_haloInner','u_haloOuter','u_falloff','u_intensity','u_angle','u_hue','u_exposure','u_haloMix','u_t','u_bg']
 .forEach(n=>U[n]=gl.getUniformLocation(prog,n));
const uStops=gl.getUniformLocation(prog,'u_stops[0]');

const stopsFlat=new Float32Array(36);
function applyPalette(idx){ palIdx=(idx+PALETTES.length)%PALETTES.length; const pal=PALETTES[palIdx];
  pal.stops.forEach((s,i)=>{const c=hexToRGB(s); stopsFlat[i*3]=c[0]; stopsFlat[i*3+1]=c[1]; stopsFlat[i*3+2]=c[2];});
  document.getElementById('palName').textContent='팔레트: '+pal.name; }
applyPalette(0);
const BG=hexToRGB('#E7E9EC');

/* ========================= UI ========================= */
const slidersEl=document.getElementById('sliders'); const inputs={};
SECTIONS.forEach(sec=>{
  const h=document.createElement('div'); h.className='sec-title'; h.textContent=sec.title; slidersEl.appendChild(h);
  sec.keys.forEach(k=>{ const P=PARAMS[k];
    const row=document.createElement('div'); row.className='row';
    row.innerHTML=`<label><span>${LABELS[k]}</span><span class="val" data-val="${k}">–</span></label>`;
    const inp=document.createElement('input'); inp.type='range'; inp.min=P.min; inp.max=P.max; inp.step=P.step; inp.value=state[k];
    inp.addEventListener('input',()=>{ state[k]=parseFloat(inp.value); updateVal(k); refreshShapeBtns(); });
    row.appendChild(inp); slidersEl.appendChild(row); inputs[k]=inp; });
});
const loopRow=document.createElement('div'); loopRow.className='scrub-row';
loopRow.innerHTML=`<input type="checkbox" id="loopChk" checked /><span class="lp">자동 모션(회전·호흡·빛)</span>`;
slidersEl.appendChild(loopRow);
const loopChk=loopRow.querySelector('#loopChk');

function fmt(k){ const st=PARAMS[k].step; return state[k].toFixed(st<0.01?3:(st<1?2:0)); }
function updateVal(k){ const e=document.querySelector(`[data-val="${k}"]`); if(e) e.textContent=fmt(k); }
function syncUI(){ Object.keys(inputs).forEach(k=>{ inputs[k].value=state[k]; updateVal(k); }); refreshShapeBtns(); }

// 도형 버튼
const shapeBtns=document.querySelectorAll('#shapeBtns button');
shapeBtns.forEach(b=>b.addEventListener('click',()=>{ state.shapeSides=parseInt(b.dataset.sides); syncUI(); }));
function refreshShapeBtns(){ shapeBtns.forEach(b=>b.classList.toggle('on', parseInt(b.dataset.sides)===Math.round(state.shapeSides))); }
syncUI();

/* ========================= 버튼 ========================= */
let playing=true, startT=performance.now(), pausedT=0;
const playBtn=document.getElementById('playBtn');
playBtn.addEventListener('click',()=>{ playing=!playing; playBtn.textContent=playing?'⏸ 일시정지':'▶ 재생'; if(playing) startT=performance.now()-pausedT; });
document.getElementById('resetBtn').addEventListener('click',()=>{ Object.keys(PARAMS).forEach(k=>state[k]=PARAMS[k].def); applyPalette(0); syncUI(); playing=true; playBtn.textContent='⏸ 일시정지'; startT=performance.now(); pausedT=0; loopChk.checked=true; });
document.getElementById('palBtn').addEventListener('click',()=>applyPalette(palIdx+1));

function rand(a,b){ return a+Math.random()*(b-a); }
document.getElementById('rndBtn').addEventListener('click',()=>{
  state.orbSize=rand(0.18,0.40);
  state.shapeSides=[0,3,4,5,6][Math.floor(rand(0,5))];
  state.shapeRound=rand(0,0.6); state.shapeRot=Math.round(rand(0,90));
  state.distortAmt=rand(0,0.30); state.distortFreq=Math.round(rand(2,10));
  state.edgeAC=Math.round(rand(0,360)); state.edgeAW=Math.round(rand(20,90));
  state.edgeBC=Math.round(rand(0,360)); state.edgeBW=Math.round(rand(20,90));
  state.edgeContrast=rand(0.55,1.0); state.blurAmt=rand(0.06,0.22);
  state.lightSize=rand(0.16,0.46); state.lightAmt=rand(0.2,0.7); state.lightUneven=rand(0.3,1.0);
  state.hue=Math.round(rand(-180,180)); state.haloMix=rand(0.5,1.0); state.intensity=rand(0.6,1.2);
  state.exposure=rand(0.82,1.04); state.haloOuter=rand(0.52,0.80); state.falloff=rand(1.2,3.0);
  state.rot=Math.round(rand(4,36)); state.breath=rand(0.02,0.12);
  applyPalette(Math.floor(rand(0,PALETTES.length))); syncUI();
});

/* 녹화 */
let recorder=null, chunks=[];
const recBtn=document.getElementById('recBtn'), recDot=document.getElementById('recDot');
recBtn.addEventListener('click',()=>{ if(recorder&&recorder.state==='recording'){recorder.stop();return;}
  chunks=[]; const stream=canvas.captureStream(60);
  const mime=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm';
  recorder=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:12000000});
  recorder.ondataavailable=e=>{ if(e.data.size) chunks.push(e.data); };
  recorder.onstop=()=>{ const blob=new Blob(chunks,{type:'video/webm'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='iridescent-halo-orb.webm'; a.click(); recBtn.classList.remove('active'); recBtn.textContent='● 녹화'; recDot.classList.remove('on'); };
  recorder.start(); recBtn.classList.add('active'); recBtn.textContent='■ 정지'; recDot.classList.add('on'); });

document.getElementById('toggle').addEventListener('click',()=>document.body.classList.toggle('panel-open'));

/* ========================= 렌더 ========================= */
function frame(now){
  let tSec; if(playing){ tSec=(now-startT)/1000; pausedT=now-startT; } else { tSec=pausedT/1000; }
  const motion=loopChk.checked?1.0:0.0;
  const m=0.5-0.5*Math.cos(tSec*Math.PI/3);
  const scale=1.0+state.breath*motion*m;
  const intPulse=state.intensity*(motion?(0.9+0.25*m):1.0);
  const haloAngle=motion?(tSec*state.rot)%360:0.0;
  const shapeAngle=(motion?(tSec*state.shapeRot):0.0)*Math.PI/180;
  const sharpF=lerp(0.030,0.0025,state.edgeContrast);

  gl.viewport(0,0,canvas.width,canvas.height);
  gl.uniform2f(U.u_res,canvas.width,canvas.height);
  gl.uniform2f(U.u_center,0.5,0.46);
  gl.uniform1f(U.u_radius,state.orbSize*scale);
  gl.uniform1f(U.u_shapeSides,state.shapeSides);
  gl.uniform1f(U.u_shapeRound,state.shapeRound);
  gl.uniform1f(U.u_shapeAngle,shapeAngle);
  gl.uniform1f(U.u_distortAmt,state.distortAmt);
  gl.uniform1f(U.u_distortFreq,state.distortFreq);
  gl.uniform2f(U.u_edgeA,state.edgeAC,state.edgeAW);
  gl.uniform2f(U.u_edgeB,state.edgeBC,state.edgeBW);
  gl.uniform1f(U.u_sharpFeather,sharpF);
  gl.uniform1f(U.u_blurFeather,state.blurAmt);
  gl.uniform1f(U.u_lightSize,state.lightSize);
  gl.uniform1f(U.u_lightAmt,state.lightAmt);
  gl.uniform1f(U.u_lightUneven,state.lightUneven);
  gl.uniform1f(U.u_glowSpread,0.08);
  gl.uniform1f(U.u_haloInner,0.30);
  gl.uniform1f(U.u_haloOuter,state.haloOuter);
  gl.uniform1f(U.u_falloff,state.falloff);
  gl.uniform1f(U.u_intensity,intPulse);
  gl.uniform1f(U.u_angle,haloAngle);
  gl.uniform1f(U.u_hue,state.hue);
  gl.uniform1f(U.u_exposure,state.exposure);
  gl.uniform1f(U.u_haloMix,state.haloMix);
  gl.uniform1f(U.u_t, motion?tSec:0.0);
  gl.uniform3f(U.u_bg,BG[0],BG[1],BG[2]);
  gl.uniform3fv(uStops,stopsFlat);
  gl.drawArrays(gl.TRIANGLES,0,3);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
