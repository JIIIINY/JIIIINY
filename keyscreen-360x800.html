<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=360, initial-scale=1.0, viewport-fit=cover">
<title>Key Screen · 360×800</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;width:100%}
  body{
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;background:#0c0c10;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    overflow:hidden;
  }

  /* ---- mobile key screen frame: exactly 360 × 800, centered ---- */
  .phone{
    position:relative;
    width:360px;height:800px;
    border-radius:40px;
    overflow:hidden;
    background:#050507;
    box-shadow:0 30px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04);
  }
  .phone canvas{
    position:absolute;inset:0;width:360px;height:800px;display:block;
  }

  /* status / clock overlay (lock-screen style) */
  .ui{position:absolute;inset:0;z-index:2;pointer-events:none;color:#fff}
  .statusbar{
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 22px 0;font-size:12px;font-weight:600;letter-spacing:.02em;
    color:rgba(255,255,255,.92);
  }
  .statusbar .icons{display:flex;gap:6px;align-items:center;font-size:11px}
  .clock{
    position:absolute;top:96px;left:0;right:0;text-align:center;
    text-shadow:0 2px 24px rgba(0,0,0,.45);
  }
  .clock .time{font-size:78px;font-weight:200;letter-spacing:-.02em;line-height:1}
  .clock .date{margin-top:6px;font-size:15px;font-weight:500;color:rgba(255,255,255,.82);letter-spacing:.04em}

  .hint{
    position:absolute;bottom:34px;left:0;right:0;text-align:center;
    font-size:12px;color:rgba(255,255,255,.55);letter-spacing:.06em;
  }
  .grabber{
    position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
    width:120px;height:4px;border-radius:4px;background:rgba(255,255,255,.4);
  }

  /* ---- control panel (buttons) ---- */
  .controls{
    position:fixed;right:28px;top:50%;transform:translateY(-50%);
    width:208px;padding:18px 16px;z-index:30;
    background:rgba(20,20,24,.82);border:1px solid rgba(255,255,255,.10);
    border-radius:18px;color:#e8e8ee;
    backdrop-filter:blur(16px) saturate(1.2);-webkit-backdrop-filter:blur(16px) saturate(1.2);
    box-shadow:0 12px 48px rgba(0,0,0,.4);
  }
  .controls h2{font-size:11px;font-weight:700;letter-spacing:.10em;color:#c9b8ff;margin-bottom:14px}
  .grp{margin-bottom:14px}
  .grp:last-child{margin-bottom:0}
  .grp .lab{font-size:10px;color:rgba(255,255,255,.5);margin-bottom:7px;letter-spacing:.04em}
  .grp .btns{display:flex;flex-wrap:wrap;gap:6px}
  .grp button{
    flex:1 1 auto;min-width:40px;padding:8px 6px;font-size:11.5px;font-weight:600;
    border:1px solid rgba(255,255,255,.12);border-radius:10px;
    background:rgba(255,255,255,.06);color:#dcdce4;cursor:pointer;
    transition:background .18s,border-color .18s,color .18s;
  }
  .grp button:hover{background:rgba(255,255,255,.12)}
  .grp button.active{background:rgba(201,184,255,.22);border-color:#c9b8ff;color:#fff}
  @media (max-width:680px){ .controls{position:static;transform:none;margin-top:18px;width:340px} body{flex-direction:column;overflow:auto} }
</style>
</head>
<body>
  <div class="phone">
    <canvas id="gl" width="720" height="1600"></canvas>
    <div class="ui">
      <div class="statusbar">
        <span id="sbtime">9:41</span>
        <span class="icons">●●● &nbsp;￩ &nbsp;100%</span>
      </div>
      <div class="clock">
        <div class="time" id="bigtime">9:41</div>
        <div class="date" id="bigdate">6월 24일 수요일</div>
      </div>
      <div class="hint">밀어서 잠금 해제</div>
      <div class="grabber"></div>
    </div>
  </div>

  <!-- ===== character control buttons ===== -->
  <div class="controls">
    <h2>캐릭터 표정</h2>
    <div class="grp">
      <div class="lab">표정</div>
      <div class="btns" data-group="expr">
        <button data-val="0" class="active">기본</button>
        <button data-val="1">웃음</button>
        <button data-val="2">놀람</button>
        <button data-val="3">졸림</button>
      </div>
    </div>
    <div class="grp">
      <div class="lab">눈 크기</div>
      <div class="btns" data-group="eyeScale">
        <button data-val="0.85">작게</button>
        <button data-val="1.0" class="active">보통</button>
        <button data-val="1.2">크게</button>
      </div>
    </div>
    <div class="grp">
      <div class="lab">깜빡임</div>
      <div class="btns" data-group="blinkRate">
        <button data-val="0">없음</button>
        <button data-val="0.06">천천히</button>
        <button data-val="0.12" class="active">보통</button>
        <button data-val="0.24">빠르게</button>
      </div>
    </div>
    <div class="grp">
      <div class="lab">시선</div>
      <div class="btns" data-group="gazeMode">
        <button data-val="auto" class="active">자동</button>
        <button data-val="follow">따라오기</button>
      </div>
    </div>
  </div>

<script>
/* ---------- config dumped by the user ---------- */
const CFG = {"v":40,"state":0,"sliders":{"rpx":440,"spd":12,"lgt":0.75,"shd":0.5,"sct":1.95,"blr":0.6,"wrp":0.0,"lsn":0.4,"wid":0.44,"rim":0.15,"riw":0.015,"gli":0,"gls":0.5,"eyi":0.9,"eyg":0.2,"swi":0,"sww":0.3,"sws":0.5,"swa":0,"iri":0.25,"irs":0.4,"pls":0.65,"cau":0,"flr":1.15,"fli":0.75,"flw":0.94,"fei1":0.4,"feo1":1.3,"flci":0.65,"bsf":1.26,"bhd":0.7,"fr":92,"pfr":0.85,"cap":0.4,"capw":0.4,"litW":0.43,"litInt":1.0,"litAng":90,"litSpd":0.36,"litShadowAmt":0.8,"litShadowBlur":0.2,"colSplit":0.64,"sphereAlphaSlider":0.65,"contrastSlider":1.5},
  colors:{"cP":"#f060a0","cS":"#d43030","cC":"#30d030","litColor":"#3060e8","litShadowCol":"#3d1a4e","flcc":"#6b52c8"}};

const S = CFG.sliders, C = CFG.colors;
function hex(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16)/255,parseInt(h.slice(2,4),16)/255,parseInt(h.slice(4,6),16)/255];}

/* ---------- face controls (driven by the button panel) ---------- */
const face = { expr:0, eyeScale:1.0, blinkRate:0.12, gazeMode:'auto' };
const follow = { x:0, y:0 };   // cursor-follow gaze offset

document.querySelectorAll('.controls .btns').forEach(g=>{
  const key = g.dataset.group;
  g.querySelectorAll('button').forEach(b=>{
    b.addEventListener('click', ()=>{
      g.querySelectorAll('button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      face[key] = (key==='gazeMode') ? b.dataset.val : parseFloat(b.dataset.val);
    });
  });
});

// track pointer over the phone for "따라오기" gaze
window.addEventListener('pointermove', e=>{
  const c = document.getElementById('gl').getBoundingClientRect();
  const nx =  (e.clientX - c.left - c.width/2)/c.width;
  const ny = -(e.clientY - c.top  - c.height/2)/c.width;  // y up
  const k = 0.10, lim = 0.05;
  follow.x = Math.max(-lim, Math.min(lim, nx*k));
  follow.y = Math.max(-lim, Math.min(lim, ny*k));
});

const cv = document.getElementById('gl');
const gl = cv.getContext('webgl', {alpha:false, antialias:true, premultipliedAlpha:false});

const VERT = `attribute vec2 a; void main(){ gl_Position = vec4(a,0.0,1.0); }`;

const FRAG = `
precision highp float;
uniform vec2  u_res;
uniform float u_time;
uniform float u_wid, u_rim, u_riw, u_sct, u_lgt, u_shd, u_iri, u_irs, u_pls;
uniform float u_litAng, u_litW, u_litInt, u_shadowAmt, u_shadowBlur, u_colSplit;
uniform float u_alpha, u_contrast, u_flr, u_fli;
uniform float u_eyi, u_eyg;
uniform vec2  u_gaze;
uniform float u_eyeScale, u_blinkRate, u_expr;
uniform vec3  u_cP, u_cS, u_cC, u_lit, u_litShadow, u_flcc;

float hash(vec2 p){ p=fract(p*vec2(123.34,345.45)); p+=dot(p,p+34.345); return fract(p.x*p.y); }
float noise(vec2 p){
  vec2 i=floor(p), f=fract(p);
  float a=hash(i), b=hash(i+vec2(1.,0.)), c=hash(i+vec2(0.,1.)), d=hash(i+vec2(1.,1.));
  vec2 u=f*f*(3.0-2.0*f);
  return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
}
float fbm(vec2 p){ float v=0.0,a=0.5; for(int i=0;i<5;i++){v+=a*noise(p);p=p*2.0+vec2(11.3,7.1);a*=0.5;} return v; }
vec3 irid(float t){
  vec3 a=vec3(0.5), b=vec3(0.5), c=vec3(1.0,1.0,1.0), d=vec3(0.0,0.33,0.67);
  return a + b*cos(6.28318*(c*t+d));
}

void main(){
  // center in a 360x800 portrait frame, normalize by width so the sphere is round
  vec2 uv = (gl_FragCoord.xy - 0.5*u_res)/u_res.x;
  float t = u_time;

  // gentle breathing / pulse
  float pulse = 1.0 + u_pls*0.04*sin(t*1.1);
  float R = u_wid*1.05*pulse;

  // slow organic warp of the surface
  vec2 w = vec2(fbm(uv*2.4+vec2(0.0,t*0.05)), fbm(uv*2.4+vec2(5.2,-t*0.04)));
  vec2 p = uv + (w-0.5)*0.03;

  float r = length(p);
  float ang = atan(p.y, p.x);

  // ---- sphere mask (soft) ----
  float edge = 0.006 + u_riw*1.2;
  float sphere = smoothstep(R+edge, R-edge, r);
  if(sphere < 0.001){
    // dark vignette background
    float bg = 0.04 - 0.03*length(uv);
    gl_FragColor = vec4(vec3(max(bg,0.0)), 1.0);
    return;
  }

  // fake 3D normal of the sphere
  float z = sqrt(max(R*R - r*r, 0.0))/R;
  vec3 N = normalize(vec3(p/R, z));

  // directional light from litAng (degrees)
  float la = radians(u_litAng);
  vec3 L = normalize(vec3(cos(la), sin(la), 0.7));
  float diff = clamp(dot(N,L), 0.0, 1.0);
  float lit = mix(u_shd*0.5, 1.0, pow(diff, mix(1.0,2.2,u_shadowBlur)) ) * (0.6+u_lgt);

  // ---- base color : split / blend between primary & secondary, complement on shadow ----
  float split = u_colSplit;
  float band = 0.5 + 0.5*sin(ang*1.0 + t*0.15);
  vec3 base = mix(u_cS, u_cP, smoothstep(split-0.35, split+0.35, band));
  // complement glints high on the lit pole
  base = mix(base, u_cC, smoothstep(0.7,1.0,diff)*0.25);

  // subsurface scatter glow (sct) — light bleeding through the orb
  float sss = pow(1.0 - z, 1.5);
  vec3 scatter = u_lit * sss * u_sct * 0.18;

  // shadow tint toward litShadowCol on the dark side
  vec3 shadeCol = mix(u_litShadow, vec3(1.0), diff);
  vec3 col = base * lit * shadeCol;
  col += scatter;

  // ---- iridescent rim ----
  float fres = pow(1.0 - z, 3.0);
  float rimMask = smoothstep(R-u_rim, R, r);
  float iv = ang/6.28318 + t*0.03 + 0.3*fbm(p*3.0+t*0.04);
  vec3 rim = irid(iv) * (rimMask*fres) * (u_rim*6.0 + 0.4);
  col += mix(rim, rim*u_lit, 0.5) * (0.4 + u_iri*2.0);

  // small specular highlight
  vec3 H = normalize(L + vec3(0.0,0.0,1.0));
  float spec = pow(clamp(dot(N,H),0.0,1.0), 60.0);
  col += vec3(1.0)*spec*0.9*u_lgt;

  // ================= FACE (eyes · brows · mouth) =================
  // un-project to the sphere front so features hug the surface
  vec2 fp = p / max(z,0.35);

  // expression flags
  bool happy    = (u_expr>0.5 && u_expr<1.5);
  bool surprise = (u_expr>1.5 && u_expr<2.5);
  bool sleepy   = (u_expr>2.5);

  // gaze comes from JS (auto-drift or cursor-follow)
  vec2 gaze = u_gaze;

  // blink: u_blinkRate==0 => never closes; sleepy => half-lidded
  float openBase = sleepy ? 0.5 : 1.0;
  float blink = 1.0;
  if(u_blinkRate > 0.001){
    float ph = fract(t*u_blinkRate);
    blink = clamp(smoothstep(0.0,0.06, abs(ph-0.5)-0.40)*1.6, 0.0, 1.0);
  }
  float eyeOpen = max(openBase*blink, 0.04);

  float wide   = surprise ? 1.18 : 1.0;
  float eyeSep = R*0.42;
  float eyeY   = R*0.10;
  float eyeR   = R*(0.20+u_eyi*0.06)*u_eyeScale*wide;

  for(int e=0;e<2;e++){
    float sgn = (e==0)?-1.0:1.0;
    vec2 ec = vec2(sgn*eyeSep, eyeY);

    // ---- eyeball ----
    vec2 d2 = (fp - ec - gaze);
    d2.y /= eyeOpen;                    // vertical squash = blink
    float de = length(d2);
    float white = smoothstep(eyeR, eyeR*0.92, de);
    if(white>0.001){
      vec3 eyeWhite = mix(vec3(0.92,0.94,1.0), u_litShadow*0.6, 0.25);
      col = mix(col, eyeWhite, white*0.96);

      float irisR = eyeR*0.55;
      vec2 id = (fp - ec - gaze*1.6);
      float di = length(id);
      float irisM = smoothstep(irisR, irisR*0.86, di)*white;
      vec3 irisCol = mix(u_lit, u_cC, 0.4) * (0.7+0.6*irid(di*5.0+t*0.2).r);
      col = mix(col, irisCol, irisM*0.95);

      float pupR = irisR*(sleepy?0.55:0.45);
      float pupM = smoothstep(pupR, pupR*0.8, di)*white;
      col = mix(col, vec3(0.02,0.02,0.04), pupM);

      float g1 = smoothstep(eyeR*0.16,0.0,length(id-vec2(-irisR*0.4,irisR*0.4)));
      col += vec3(1.0)*g1*white*(0.8+u_eyg*1.5);
      float g2 = smoothstep(eyeR*0.08,0.0,length(id-vec2(irisR*0.25,-irisR*0.25)));
      col += vec3(1.0)*g2*white*0.4;

      float lid = smoothstep(eyeR*0.92,eyeR,de)*white;
      col = mix(col, col*0.55, lid);
    }

    // ---- eyebrow ----
    float browLift = surprise ? eyeR*0.62 : (sleepy ? eyeR*0.34 : eyeR*0.46);
    // inner end tilt: sleepy/sad inner-down, happy slight raise, surprise flat
    float innerTilt = sleepy ? -0.55 : (happy ? 0.30 : (surprise ? 0.0 : 0.12));
    vec2 bc = vec2(sgn*eyeSep, eyeY + eyeR + browLift);
    vec2 bd = fp - bc;
    float bang = sgn*innerTilt;
    float bx = bd.x*cos(bang) - bd.y*sin(bang);
    float by = bd.x*sin(bang) + bd.y*cos(bang);
    float brow = smoothstep(eyeR*0.62,eyeR*0.50,abs(bx)) * smoothstep(eyeR*0.11,0.0,abs(by));
    col = mix(col, col*0.22 + vec3(0.02), brow*0.92);
  }

  // ---- mouth ----
  vec2 mc = vec2(0.0, eyeY - eyeR*1.7);
  vec2 md = fp - mc;
  float mw = R*0.22;
  if(surprise){
    float oe = length(vec2(md.x/(mw*0.62), md.y/(mw*0.72)));
    float m = smoothstep(1.0,0.85,oe);
    col = mix(col, vec3(0.05,0.02,0.04), m);
    col = mix(col, u_cS*0.45, smoothstep(0.6,0.0,oe)*0.5);   // inner mouth tint
  } else {
    // curvature: default gentle smile, happy big smile, sleepy slight frown
    float curv = sleepy ? -0.5 : (happy ? 1.8 : 0.9);
    float yc = mc.y + curv*(md.x*md.x)/R;
    float dd = fp.y - yc;
    float th = R*0.024;
    float band = smoothstep(th,0.0,abs(dd)) * smoothstep(mw,mw*0.85,abs(md.x));
    col = mix(col, vec3(0.06,0.02,0.03), band*0.9);
  }
  // ============================================================

  // soft outer halo / flare bloom
  float halo = smoothstep(R+0.18, R, r)*(1.0-sphere);
  vec3 bloom = u_flcc * halo * u_fli * 0.5;

  // contrast
  col = (col-0.5)*u_contrast + 0.5;
  col = max(col, 0.0);

  // composite sphere over dark bg + bloom
  float bg = 0.04 - 0.03*length(uv);
  vec3 outc = mix(vec3(max(bg,0.0))+bloom, col, sphere*u_alpha + sphere*(1.0-u_alpha)*0.9);

  gl_FragColor = vec4(outc, 1.0);
}`;

function sh(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(s));return s;}
const prog=gl.createProgram();
gl.attachShader(prog,sh(gl.VERTEX_SHADER,VERT));
gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FRAG));
gl.linkProgram(prog);gl.useProgram(prog);

const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const loc=gl.getAttribLocation(prog,'a');
gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

function u(n){return gl.getUniformLocation(prog,n);}
const U={res:u('u_res'),time:u('u_time'),wid:u('u_wid'),rim:u('u_rim'),riw:u('u_riw'),
  sct:u('u_sct'),lgt:u('u_lgt'),shd:u('u_shd'),iri:u('u_iri'),irs:u('u_irs'),pls:u('u_pls'),
  litAng:u('u_litAng'),litW:u('u_litW'),litInt:u('u_litInt'),shadowAmt:u('u_shadowAmt'),
  shadowBlur:u('u_shadowBlur'),colSplit:u('u_colSplit'),alpha:u('u_alpha'),contrast:u('u_contrast'),
  flr:u('u_flr'),fli:u('u_fli'),cP:u('u_cP'),cS:u('u_cS'),cC:u('u_cC'),lit:u('u_lit'),
  litShadow:u('u_litShadow'),flcc:u('u_flcc'),eyi:u('u_eyi'),eyg:u('u_eyg'),
  gaze:u('u_gaze'),eyeScale:u('u_eyeScale'),blinkRate:u('u_blinkRate'),expr:u('u_expr')};

gl.viewport(0,0,cv.width,cv.height);

let t0=performance.now();
function frame(now){
  const t=(now-t0)/1000 * (S.spd/12);  // spd drives animation speed
  gl.uniform2f(U.res,cv.width,cv.height);
  gl.uniform1f(U.time,t);
  gl.uniform1f(U.wid,S.wid);
  gl.uniform1f(U.rim,S.rim);
  gl.uniform1f(U.riw,S.riw);
  gl.uniform1f(U.sct,S.sct);
  gl.uniform1f(U.lgt,S.lgt);
  gl.uniform1f(U.shd,S.shd);
  gl.uniform1f(U.iri,S.iri);
  gl.uniform1f(U.irs,S.irs);
  gl.uniform1f(U.pls,S.pls);
  gl.uniform1f(U.litAng,S.litAng);
  gl.uniform1f(U.litW,S.litW);
  gl.uniform1f(U.litInt,S.litInt);
  gl.uniform1f(U.shadowAmt,S.litShadowAmt);
  gl.uniform1f(U.shadowBlur,S.litShadowBlur);
  gl.uniform1f(U.colSplit,S.colSplit);
  gl.uniform1f(U.alpha,S.sphereAlphaSlider);
  gl.uniform1f(U.contrast,S.contrastSlider);
  gl.uniform1f(U.flr,S.flr);
  gl.uniform1f(U.fli,S.fli);
  gl.uniform1f(U.eyi,S.eyi);
  gl.uniform1f(U.eyg,S.eyg);
  // ---- face controls (buttons) ----
  let gx, gy;
  if(face.gazeMode==='follow'){ gx=follow.x; gy=follow.y; }
  else { gx=Math.sin(t*0.5)*0.018; gy=Math.sin(t*0.37+1.0)*0.012; }
  gl.uniform2f(U.gaze, gx, gy);
  gl.uniform1f(U.eyeScale, face.eyeScale);
  gl.uniform1f(U.blinkRate, face.blinkRate);
  gl.uniform1f(U.expr, face.expr);
  gl.uniform3fv(U.cP,hex(C.cP));
  gl.uniform3fv(U.cS,hex(C.cS));
  gl.uniform3fv(U.cC,hex(C.cC));
  gl.uniform3fv(U.lit,hex(C.litColor));
  gl.uniform3fv(U.litShadow,hex(C.litShadowCol));
  gl.uniform3fv(U.flcc,hex(C.flcc));
  gl.drawArrays(gl.TRIANGLES,0,3);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ---- live clock ---- */
const days=['일','월','화','수','목','금','토'];
function tick(){
  const d=new Date();
  let h=d.getHours(), m=d.getMinutes().toString().padStart(2,'0');
  const hh=((h%12)||12);
  document.getElementById('bigtime').textContent = hh+':'+m;
  document.getElementById('sbtime').textContent = hh+':'+m;
  document.getElementById('bigdate').textContent = (d.getMonth()+1)+'월 '+d.getDate()+'일 '+days[d.getDay()]+'요일';
}
tick(); setInterval(tick,1000);
</script>
</body>
</html>
