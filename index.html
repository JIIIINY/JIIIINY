  :root{ --proj:'Iridescent Halo Orb'; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:#0d0d0f; color:#e8e8ea; overflow:hidden;
    font-family:"One UI Sans","OneUI Sans","Samsung Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif; }

  /* 상단 바 */
  .topbar{ position:fixed; top:0; left:0; right:0; height:52px; z-index:40; display:flex; align-items:center; justify-content:space-between;
    padding:0 14px; background:rgba(18,18,22,.85); border-bottom:1px solid #26262b; backdrop-filter:blur(8px); }
  .brand{ display:flex; align-items:baseline; gap:8px; }
  .brand .name{ font-size:14px; font-weight:600; letter-spacing:.2px; }
  .brand .ver{ font-size:11px; color:#7bd0b0; }
  .topbtns{ display:flex; gap:6px; flex-wrap:wrap; }
  .topbtns button{ background:#232329; color:#e8e8ea; border:1px solid #34343c; border-radius:9px; padding:7px 9px; font-size:12px; cursor:pointer; white-space:nowrap; }
  .topbtns button:active{ background:#2c2c34; }
  .topbtns button.rnd{ background:#6c5cf0; color:#fff; border-color:#6c5cf0; font-weight:600; }
  .topbtns button.rec.active{ background:#ff3b30; color:#fff; border-color:#ff3b30; }

  /* 무대 + 키스크린 */
  .stage{ position:fixed; top:52px; left:0; right:0; bottom:0; display:flex; align-items:center; justify-content:center;
    transition:padding .25s ease; }
  body.lp-open .stage{ padding-left:300px; }
  body.rp-open .stage{ padding-right:300px; }
  @media (max-width:900px){ body.lp-open .stage{ padding-left:0; } body.rp-open .stage{ padding-right:0; } }
  .canvas-wrap{ position:relative; width:360px; height:780px; max-height:82vh; aspect-ratio:360/780;
    border-radius:92px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,.55); }
  canvas#view{ display:block; width:100%; height:100%; border-radius:92px; }
  .rec-dot{ position:absolute; top:12px; left:12px; display:none; align-items:center; gap:6px; font-size:12px; color:#fff;
    background:rgba(0,0,0,.4); padding:4px 10px; border-radius:999px; }
  .rec-dot.on{ display:flex; } .rec-dot .blink{ width:9px;height:9px;border-radius:50%;background:#ff3b30;animation:blink 1s steps(2,start) infinite; }
  @keyframes blink{ 50%{opacity:.15;} }
  .kswrap{ display:flex; flex-direction:column; align-items:center; gap:14px; }
  .navbar{ display:flex; align-items:center; gap:16px; }
  .nav{ width:42px; height:42px; border-radius:50%; background:rgba(40,40,48,.92); color:#fff; border:1px solid #3a3a44; font-size:22px; cursor:pointer; }
  .nav:active{ background:rgba(62,62,74,1); }
  .pageind{ display:flex; align-items:center; gap:8px; }
  .pageind .dot{ width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.28); cursor:pointer; transition:all .2s; }
  .pageind .dot.on{ width:22px; border-radius:4px; background:#fff; }
  .screenlabel{ margin-top:-6px; font-size:12px; letter-spacing:2px; color:#9a9aa2; }
  .screenbtns{ display:flex; gap:8px; margin-top:2px; }
  .screenbtns button{ background:rgba(40,40,48,.92); color:#cfcfd6; border:1px solid #3a3a44; border-radius:999px; padding:6px 14px; font-size:12px; cursor:pointer; transition:all .2s; }
  .screenbtns button.on{ background:#fff; color:#15151a; border-color:#fff; font-weight:600; }
  .ctxctrl{ display:flex; gap:8px; min-height:0; }
  .ctxctrl button{ background:rgba(40,40,48,.92); color:#cfcfd6; border:1px solid #3a3a44; border-radius:999px; padding:6px 14px; font-size:12px; cursor:pointer; }
  .ctxctrl button.on{ background:#6c5cf0; color:#fff; border-color:#6c5cf0; }
  #xfade{ position:absolute; inset:0; width:100%; height:100%; display:block; z-index:2; pointer-events:none; opacity:0; border-radius:92px; }
  .rec-dot{ z-index:5; }

  /* 패널 공통 */
  .panel{ position:fixed; top:52px; bottom:0; width:300px; background:#141417; z-index:30; overflow-y:auto; padding:0 0 40px;
    transition:transform .25s ease; }
  .panel.left{ left:0; border-right:1px solid #26262b; }
  .panel.right{ right:0; border-left:1px solid #26262b; }
  body:not(.lp-open) .panel.left{ transform:translateX(-100%); }
  body:not(.rp-open) .panel.right{ transform:translateX(100%); }
  .phead{ position:sticky; top:0; background:#161619; display:flex; align-items:center; justify-content:space-between;
    padding:12px 14px; border-bottom:1px solid #26262b; z-index:2; }
  .phead h2{ font-size:13px; margin:0; }
  .phead .dd{ background:none; border:1px solid #34343c; color:#e8e8ea; border-radius:8px; width:30px; height:26px; cursor:pointer; }
  .pbody{ padding:12px 14px; }
  .panel.collapsed .pbody{ display:none; }

  .sec-title{ font-size:11px; letter-spacing:.4px; text-transform:uppercase; color:#7b7b85; margin:14px 0 8px; }
  .row{ margin-bottom:11px; }
  .row label{ display:flex; justify-content:space-between; align-items:baseline; font-size:12px; color:#b9b9c0; margin-bottom:5px; }
  .row label .val{ font-variant-numeric:tabular-nums; color:#f0c45a; font-size:11px; }
  .row label .num{ width:64px; background:#0f0f12; border:1px solid #2a2a31; color:#f0c45a; border-radius:6px; padding:3px 6px; font-size:11px; text-align:right; font-variant-numeric:tabular-nums; -moz-appearance:textfield; }
  .row label .num::-webkit-outer-spin-button,.row label .num::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  input[type=range]{ width:100%; -webkit-appearance:none; appearance:none; height:4px; border-radius:4px; background:#2c2c33; outline:none; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:16px;height:16px;border-radius:50%;background:#f0c45a;border:2px solid #141417;cursor:pointer; }
  input[type=range]::-moz-range-thumb{ width:16px;height:16px;border-radius:50%;background:#f0c45a;border:2px solid #141417;cursor:pointer; }
  .btns{ display:flex; gap:7px; flex-wrap:wrap; margin:8px 0; }
  button.b{ flex:1 1 auto; background:#232329; color:#e8e8ea; border:1px solid #34343c; border-radius:9px; padding:9px 8px; font-size:12px; cursor:pointer; }
  button.b:active{ background:#2c2c34; } button.b.on{ background:#f0c45a; color:#1a1206; border-color:#f0c45a; font-weight:600; }
