<script>
// 공유 기하 모듈 (Node require + 브라우저 <script> 양쪽 지원).
// 형태 → 경계점 변환. 오목 형태 보존(각도정렬 없이 와인딩+최우측 시작).
(function (root, factory) {
  if (typeof module === 'object' && module.exports) module.exports = factory();
  else root.MorphGeo = factory();
})(typeof self !== 'undefined' ? self : this, function () {
  const TAU = Math.PI * 2;
  const centroid = p => { let x = 0, y = 0; for (const q of p) { x += q[0]; y += q[1]; } return [x / p.length, y / p.length]; };

  function resample(poly, n) {
    const acc = [0]; let total = 0;
    for (let i = 1; i < poly.length; i++) { total += Math.hypot(poly[i][0] - poly[i - 1][0], poly[i][1] - poly[i - 1][1]); acc.push(total); }
    const out = [];
    for (let i = 0; i < n; i++) {
      const d = (i / n) * total; let k = 1; while (k < acc.length && acc[k] < d) k++;
      const a = acc[k - 1], b = acc[k] || total, t = (b - a) ? (d - a) / (b - a) : 0, p0 = poly[k - 1], p1 = poly[k % poly.length];
      out.push([p0[0] + (p1[0] - p0[0]) * t, p0[1] + (p1[1] - p0[1]) * t]);
    }
    return out;
  }
  function sampleClosed(ctrl, n) {
    const m = ctrl.length, dense = [], steps = 24;
    for (let i = 0; i < m; i++) {
      const p0 = ctrl[(i - 1 + m) % m], p1 = ctrl[i], p2 = ctrl[(i + 1) % m], p3 = ctrl[(i + 2) % m];
      for (let s = 0; s < steps; s++) {
        const t = s / steps, t2 = t * t, t3 = t2 * t;
        dense.push([
          0.5 * ((2 * p1[0]) + (-p0[0] + p2[0]) * t + (2 * p0[0] - 5 * p1[0] + 4 * p2[0] - p3[0]) * t2 + (-p0[0] + 3 * p1[0] - 3 * p2[0] + p3[0]) * t3),
          0.5 * ((2 * p1[1]) + (-p0[1] + p2[1]) * t + (2 * p0[1] - 5 * p1[1] + 4 * p2[1] - p3[1]) * t2 + (-p0[1] + 3 * p1[1] - 3 * p2[1] + p3[1]) * t3)]);
      }
    }
    return resample(dense, n);
  }
  function sampleStar(star, n) {
    const c = [0.5, 0.5], out = [];
    for (let i = 0; i < n; i++) {
      const a = (i / n) * TAU, k = Math.abs(Math.cos(2 * a)), spike = Math.pow(k, 1 + star.spikeSharpness * 8);
      const r = star.innerRadius + (star.outerRadius - star.innerRadius) * spike;
      out.push([c[0] + Math.cos(a) * r, c[1] + Math.sin(a) * r]);
    }
    return out;
  }
  function sampleMetaballs(balls, n) {
    let cx = 0, cy = 0; for (const b of balls) { cx += b.center[0]; cy += b.center[1]; } cx /= balls.length; cy /= balls.length;
    const out = [];
    for (let i = 0; i < n; i++) {
      const a = (i / n) * TAU, dx = Math.cos(a), dy = Math.sin(a); let rmax = 0;
      for (const b of balls) {
        const ox = b.center[0] - cx, oy = b.center[1] - cy, proj = ox * dx + oy * dy, perp2 = (ox * ox + oy * oy) - proj * proj;
        if (perp2 <= b.radius * b.radius) { const reach = proj + Math.sqrt(b.radius * b.radius - perp2); if (reach > rmax) rmax = reach; }
      }
      rmax *= 1.12; out.push([cx + dx * rmax, cy + dy * rmax]);
    }
    return out;
  }
  function signedArea(p) { let a = 0; for (let i = 0; i < p.length; i++) { const q = p[(i + 1) % p.length]; a += p[i][0] * q[1] - q[0] * p[i][1]; } return a / 2; }
  function stabilize(pts) {
    if (signedArea(pts) < 0) pts = pts.slice().reverse();
    let best = 0, bx = -1e9; for (let i = 0; i < pts.length; i++) if (pts[i][0] > bx) { bx = pts[i][0]; best = i; }
    return pts.slice(best).concat(pts.slice(0, best));
  }
  function shapeToPoints(s, n) {
    n = n || 128; const f = s.form; let pts;
    if (f.star) pts = sampleStar(f.star, n);
    else if (f.metaballs) pts = sampleMetaballs(f.metaballs, n);
    else pts = sampleClosed(f.blob.controlPoints, n);
    return stabilize(pts);
  }
  const lerpPts = (a, b, t) => a.map((p, i) => [p[0] + (b[i][0] - p[0]) * t, p[1] + (b[i][1] - p[1]) * t]);
  const ease = u => u < 0.5 ? 4 * u * u * u : 1 - Math.pow(-2 * u + 2, 3) / 2;
  const lerp = (a, b, t) => a + (b - a) * t;

  return { TAU, centroid, resample, sampleClosed, sampleStar, sampleMetaballs, signedArea, stabilize, shapeToPoints, lerpPts, ease, lerp };
});
</script>

      { "from": "09_glowly_gradient_abstract", "to": "07_smart_gradient_sparkle", "morphType": "burst-converge", "durationMs": 2400 },
      { "from": "07_smart_gradient_sparkle", "to": "01_gradient_blur", "morphType": "burst-disperse", "durationMs": 2800, "loopback": true }
    ]
  },

  "agentBindings": {
    "comment": "AI agent 상태 → 형태 매핑.",
    "states": {
      "idle":       { "shape": "02_modern_gradient_blob", "playbackRate": 0.6, "breathing": true },
      "listening":  { "shape": "03_modern_gradient_shapes_cloud", "playbackRate": 0.8, "breathing": true },
      "thinking":   { "shape": "06_modern_gradient_shapes_wisp", "playbackRate": 1.2, "morphLoop": true },
      "responding": { "shape": "01_gradient_blur", "playbackRate": 1.4, "morphLoop": true },
      "success":    { "shape": "07_smart_gradient_sparkle", "playbackRate": 1.0, "oneShot": true },
      "error":      { "shape": "04_gradient_shapes_15", "playbackRate": 1.0, "hueShift": -30 }
    },
    "transitionOnStateChangeMs": 700
  }
}
;
</script>
<script>
const CFG=window.MORPH_CONFIG,G=window.MorphGeo,N=128,TAU=Math.PI*2;
const SHAPES=CFG.shapes.map(s=>({cfg:s,pts:G.shapeToPoints(s,N)}));
const noiseSeed=Array.from({length:N},(_,i)=>[Math.sin(i*12.9898)*43758.5453%1,Math.cos(i*78.233)*12543.21%1]);
const {lerpPts,ease,lerp}=G;
function hexA(hex,a){const h=hex.replace('#','');return`rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`;}
const rand=(a,b)=>a+Math.random()*(b-a);

const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const off=document.createElement('canvas'),octx=off.getContext('2d');
let W,H,S,OX,OY,DPR,grain;
function resize(){DPR=Math.min(window.devicePixelRatio||1,2);W=cv.width=off.width=innerWidth*DPR;H=cv.height=off.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';S=Math.min(W,H)*0.86;OX=(W-S)/2;OY=(H-S)/2;buildGrain();}
addEventListener('resize',resize);
function buildGrain(){const g=document.createElement('canvas');g.width=g.height=256;const gx=g.getContext('2d'),id=gx.createImageData(256,256),d=id.data;
  for(let i=0;i<d.length;i+=4){const v=Math.random()*255;d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;}gx.putImageData(id,0,0);grain=g;}
function tracePath(c,pts,now){const m=pts.length,P=[],n=CFG.globalMotion.organicNoise,ph=now*0.001*n.speed*TAU;
  for(let i=0;i<m;i++){const nx=Math.sin(ph+noiseSeed[i][0]*TAU)*n.amplitude*0.18,ny=Math.cos(ph*1.3+noiseSeed[i][1]*TAU)*n.amplitude*0.18;
    P.push([OX+(pts[i][0]+nx)*S,OY+(pts[i][1]+ny)*S]);}
  c.beginPath();c.moveTo(P[0][0],P[0][1]);
  for(let i=0;i<m;i++){const p0=P[(i-1+m)%m],p1=P[i],p2=P[(i+1)%m],p3=P[(i+2)%m];
    c.bezierCurveTo(p1[0]+(p2[0]-p0[0])/6,p1[1]+(p2[1]-p0[1])/6,p2[0]-(p3[0]-p1[0])/6,p2[1]-(p3[1]-p1[1])/6,p2[0],p2[1]);}
  c.closePath();}
function paintMesh(c,color,alpha){c.save();c.globalAlpha=alpha;c.fillStyle=color.dominant||'#888';c.fillRect(OX,OY,S,S);
  for(const pt of color.points){const cx=OX+pt.pos[0]*S,cy=OY+pt.pos[1]*S,r=Math.max(4,pt.radius*S),w=Math.min(1,pt.weight);
    const g=c.createRadialGradient(cx,cy,1,cx,cy,r);g.addColorStop(0,hexA(pt.color,w));g.addColorStop(0.55,hexA(pt.color,0.75*w));g.addColorStop(1,hexA(pt.color,0));
    c.fillStyle=g;c.fillRect(OX,OY,S,S);}c.restore();}

const lbl=document.getElementById('lbl');
let cur=Math.floor(Math.random()*SHAPES.length),next=pickNext(cur);
let dur=rand(1900,2900),hold=rand(900,1600),t0=performance.now(),playing=true,lastNow=t0;
function pickNext(c){let n;do{n=Math.floor(Math.random()*SHAPES.length);}while(n===c);return n;}
function advance(now){cur=next;next=pickNext(cur);dur=rand(1900,2900);hold=rand(900,1600);t0=now;}

function frame(now){
  if(!playing){t0+=now-lastNow;}lastNow=now;
  const total=dur+hold;let elapsed=now-t0;
  const te=ease(Math.min(elapsed/dur,1)),A=SHAPES[cur],B=SHAPES[next];
  const geom=lerpPts(A.pts,B.pts,te),ra=A.cfg.render,rb=B.cfg.render;
  const feather=lerp(ra.edgeFeather,rb.edgeFeather,te)*S,glowSpread=lerp(ra.glow.spread,rb.glow.spread,te)*S,grainAmt=lerp(ra.grain,rb.grain,te);

  ctx.globalCompositeOperation='source-over';ctx.fillStyle='#0B0E16';ctx.fillRect(0,0,W,H);
  const bm=CFG.globalMotion.breathing,bt=(now/bm.periodMs)*TAU;
  const sc=1+(bm.scaleRange[1]-bm.scaleRange[0])*0.5*Math.sin(bt),rot=bm.rotationRange[1]*Math.sin(bt*0.7)*Math.PI/180;
  ctx.save();ctx.translate(OX+S/2,OY+S/2);ctx.scale(sc,sc);ctx.rotate(rot);ctx.translate(-(OX+S/2),-(OY+S/2));

  ctx.globalCompositeOperation='screen';ctx.filter=`blur(${glowSpread.toFixed(1)}px)`;
  tracePath(ctx,geom,now);ctx.globalAlpha=ra.glow.opacity*(1-te);ctx.fillStyle=A.cfg.color.dominant;ctx.fill();
  tracePath(ctx,geom,now);ctx.globalAlpha=rb.glow.opacity*te;ctx.fillStyle=B.cfg.color.dominant;ctx.fill();ctx.globalAlpha=1;

  octx.setTransform(1,0,0,1,0,0);octx.clearRect(0,0,W,H);
  octx.save();tracePath(octx,geom,now);octx.clip();
  paintMesh(octx,A.cfg.color,A.cfg.opacity*(1-te));paintMesh(octx,B.cfg.color,B.cfg.opacity*te);octx.restore();
  ctx.filter=`blur(${Math.max(1,feather).toFixed(1)}px)`;ctx.globalCompositeOperation='screen';ctx.drawImage(off,0,0);

  ctx.filter='none';tracePath(ctx,geom,now);ctx.save();ctx.clip();
  ctx.globalAlpha=grainAmt;ctx.globalCompositeOperation='overlay';
  for(let y=0;y<H;y+=256)for(let x=0;x<W;x+=256)ctx.drawImage(grain,x,y);
  ctx.restore();ctx.globalAlpha=1;ctx.restore();

  ctx.globalCompositeOperation='source-over';
  const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3,W/2,H/2,Math.max(W,H)*0.62);
  vg.addColorStop(0,'rgba(5,7,11,0)');vg.addColorStop(1,'rgba(5,7,11,0.92)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  lbl.textContent=`${A.cfg.label}  →  ${B.cfg.label}`;
  if(elapsed>=total)advance(now);
  requestAnimationFrame(frame);
}
resize();requestAnimationFrame(frame);
document.getElementById('pp').onclick=function(){playing=!playing;this.textContent=playing?'Pause':'Play';};
document.getElementById('nx').onclick=()=>{advance(performance.now());};
</script>
</body>
